<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>璐小家</title>

<style>
body{
  margin:0;
  height:100vh;
  position: relative;

  background-size: 100% auto;
  background-repeat: no-repeat;
  background-position: center top;
  background-color: #000;

  transition:background-image 0.5s ease;
}

/* ✨ 底纹层 */
body::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: url('https://i.ibb.co/PzPCwYPM/IMG-4755.png');
  background-repeat: repeat;
  background-size: auto;
  opacity: 0.15;
  z-index: -1;
  pointer-events: none;
}

/* 时钟组件容器 */
#clockWidget {
  position: fixed;
  top: 8px;
  right: 18px;
  z-index: 1000;
  width: 170px;
  height: auto;
}

#clockWidget img {
  width: 100%;
  height: auto;
  display: block;
}

/* 时间文字覆盖层 */
.clock-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.date-text {
  position: absolute;
  top: 10%;
  left: 45%;
  font-family: "Microsoft YaHei", "SimHei", sans-serif;
  font-size: 11px;
  font-weight: bold;
  color: #3a2415;
  text-align: left;
  letter-spacing: 0.5px;
}

.time-text {
  position: absolute;
  top: 50%;
  left: 45%;
  font-family: "Arial", "Microsoft YaHei", sans-serif;
  font-size: 14px;
  font-weight: bold;
  color: #3a2415;
  letter-spacing: 1px;
}

/* 交互按钮 */
.interactive-btn {
  position: fixed;
  border: none;
  cursor: pointer;
  z-index: 100;
  padding: 0;
  background: transparent;
  transition: transform 0.2s, opacity 0.2s;
}

.interactive-btn img {
  width: 100%;
  height: 100%;
  display: block;
}

.interactive-btn:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

.interactive-btn:active {
  transform: scale(0.95);
  opacity: 0.8;
}

/* 外出按钮 */
#btnGoOut {
  top: 12px;
  left: 55px;
  width: 82px;
  height: 34px;
}

/* 家庭成员按钮 */
#btnFamily {
  top: 12px;
  left: 128px;
  width: 115px;
  height: 34px;
}

/* 主页按钮 */
#btnHome {
  top: 12px;
  right: 210px;
  width: 82px;
  height: 34px;
}

/* Kitty手机按钮 */
#btnKitty {
  top: 140px;
  right: 50px;
  width: 78px;
  height: 95px;
}

@media (max-width: 600px) {
  #clockWidget {
    width: 130px;
    top: 6px;
    right: 6px;
  }
  
  .date-text {
    font-size: 9px;
  }
  
  .time-text {
    font-size: 11px;
  }
  
  #btnGoOut {
    top: 14px;
    left: 10px;
    width: 68px;
    height: 28px;
  }

  #btnFamily {
    top: 14px;
    left: 82px;
    width: 92px;
    height: 28px;
  }

  #btnHome {
    top: 14px;
    right: 140px;
    width: 68px;
    height: 28px;
  }

  #btnKitty {
    top: 115px;
    right: 10px;
    width: 55px;
    height: 70px;
  }
}

/* ===== 互动面板 ===== */
.interactive-panel {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 2000;
  display: none;
  justify-content: center;
  align-items: center;
}
.interactive-panel.active {
  display: flex;
}

/* 面板内容包裹层：让图片保持原始比例居中 */
.panel-content {
  position: relative;
  display: inline-block;
  max-width: 90vw;
  max-height: 85vh;
}

.panel-bg {
  display: block;
  max-width: 90vw;
  max-height: 85vh;
  width: auto;
  height: auto;
  object-fit: contain;
}

/* 透明关闭热区：盖在面板背景图自带的红色叉上 */
.panel-close {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 42px;
  height: 42px;
  border: none;
  background: transparent;
  cursor: pointer;
  z-index: 2001;
  padding: 0;
  transition: transform 0.2s;
}
.panel-close:hover {
  transform: scale(1.1);
}
.panel-close:active {
  transform: scale(0.92);
}

/* ===== 主页面板位置上移 ===== */
#panelHome {
  align-items: flex-start;
  padding-top: 2vh;
}

/* 主页信息覆盖层（上下递进式） */
.home-stats-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 10;
  font-family: "SimHei", "Microsoft YaHei", "Heiti SC", sans-serif;
  font-weight: bold;
  color: #5c3a1e;
}

/* 上栏：固定信息（姓名/年龄/身高/体重/生日） */
.home-left-col {
  position: absolute;
  top: 10%;
  left: 46%;
  font-size: clamp(9px, 1.8vw, 12px);
  line-height: 1.5;
  white-space: nowrap;
}

/* 下栏：动态数值（心情/疲惫/困意/饥饿）位于固定信息正下方 */
.home-right-col {
  position: absolute;
  top: 29%;
  left: 46%;
  font-size: clamp(9px, 1.8vw, 12px);
  line-height: 1.5;
  white-space: nowrap;
}


/* ===== 小手机面板专用样式 ===== */
#panelKitty {
  align-items: center;
  justify-content: center;
}

#panelKitty .panel-content {
  max-width: 350px;
  max-height: 700px;
  position: relative;
}

/* 手机边框 */
.phone-frame {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 100;
}

/* 手机屏幕内容区 */
.phone-screen {
  position: absolute;
  top: 8%;
  left: 6.5%;
  width: 87%;
  height: 84%;
  overflow: hidden;
  background: #fff;
  border-radius: 12px;
}

/* 小手机关闭按钮 */
.phone-close-btn {
  position: absolute;
  top: 1%;
  right: 2%;
  width: 30px;
  height: 30px;
  background: rgba(255, 255, 255, 0.9);
  border: none;
  border-radius: 50%;
  cursor: pointer;
  z-index: 200;
  font-size: 20px;
  line-height: 1;
  color: #ff6b6b;
  transition: all 0.2s;
}

.phone-close-btn:hover {
  background: #fff;
  transform: scale(1.1);
}

/* 小手机内的各个界面 */
.phone-page {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background-size: cover;
  background-position: center;
}

.phone-page.active {
  display: block;
}

/* 店铺列表热区 */
.shop-list {
  position: absolute;
  top: 25%;
  left: 8%;
  width: 84%;
  height: 60%;
  overflow-y: auto;
}

.shop-item {
  position: relative;
  height: 16.6%;
  margin-bottom: 2%;
  cursor: pointer;
  background: transparent;
  border: none;
  width: 100%;
  padding: 0;
  transition: transform 0.2s;
}

.shop-item:hover {
  transform: scale(1.02);
}

.shop-item:active {
  transform: scale(0.98);
}

/* 商品列表热区 */
.product-grid {
  position: absolute;
  top: 22%;
  left: 8%;
  width: 84%;
  height: 58%;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 3%;
  overflow-y: auto;
}

.product-item {
  position: relative;
  aspect-ratio: 1;
  cursor: pointer;
  background: transparent;
  border: none;
  padding: 0;
  transition: transform 0.2s;
}

.product-item:hover {
  transform: scale(1.05);
}

.product-item:active {
  transform: scale(0.95);
}

.product-item img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* 底部导航栏 */
.phone-nav {
  position: absolute;
  bottom: 2%;
  left: 8%;
  width: 84%;
  height: 10%;
  display: flex;
  justify-content: space-around;
  align-items: center;
}

.nav-btn {
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 5px 15px;
  transition: transform 0.2s;
  flex: 1;
  height: 100%;
}

.nav-btn:hover {
  transform: scale(1.05);
}

.nav-btn:active {
  transform: scale(0.95);
}

/* 返回按钮 */
.back-btn {
  position: absolute;
  top: 3%;
  left: 5%;
  width: 35px;
  height: 35px;
  background: transparent;
  border: none;
  cursor: pointer;
  font-size: 24px;
  color: #ff9800;
  z-index: 50;
  transition: transform 0.2s;
}

.back-btn:hover {
  transform: scale(1.1);
}

.back-btn:active {
  transform: scale(0.9);
}

/* 购物车提示 */
.cart-badge {
  position: absolute;
  top: 70%;
  right: 15%;
  background: #ff6b6b;
  color: white;
  border-radius: 50%;
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: bold;
}

/* 结算页面特殊样式 */
.checkout-content {
  position: absolute;
  top: 15%;
  left: 10%;
  width: 80%;
  height: 70%;
  overflow-y: auto;
}

/* 支付成功动画 */
@keyframes successPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

.success-animation {
  animation: successPulse 1.5s ease-in-out infinite;
}

/* 小窗口提示 */
.mini-popup {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0, 0, 0, 0.85);
  color: white;
  padding: 15px 25px;
  border-radius: 10px;
  font-size: 14px;
  z-index: 300;
  display: none;
  white-space: nowrap;
}

.mini-popup.show {
  display: block;
  animation: fadeInOut 1.5s ease-in-out;
}

@keyframes fadeInOut {
  0%, 100% { opacity: 0; }
  50% { opacity: 1; }
}

</style>

<script>
// ===== 时钟图标 =====
const CLOCK_ICONS = {
  night: 'https://i.ibb.co/sJCmM13V/IMG-4775.png',
  day: 'https://i.ibb.co/bjfKnynR/IMG-4774.png',
  evening: 'https://i.ibb.co/xtdH3Mpt/IMG-4773.png'
};

function getBeijingTime() {
  const now = new Date();
  const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
  const beijingTime = new Date(utc + (3600000 * 8));
  return beijingTime;
}

function padZero(num) {
  return num.toString().padStart(2, '0');
}

function getWeekDayText(day) {
  const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
  return weekDays[day];
}

function updateClock() {
  const beijingTime = getBeijingTime();
  const hour = beijingTime.getHours();
  const minute = beijingTime.getMinutes();
  const date = beijingTime.getDate();
  const day = beijingTime.getDay();
  
  let sceneType;
  if (hour >= 7 && hour < 15) {
    sceneType = 'day';
  } else if (hour >= 15 && hour < 19) {
    sceneType = 'evening';
  } else {
    sceneType = 'night';
  }
  
  const clockIcon = document.getElementById('clockIcon');
  clockIcon.src = CLOCK_ICONS[sceneType];
  
  const dateText = document.getElementById('dateText');
  dateText.textContent = `${getWeekDayText(day)} ${padZero(date)}日`;
  
  const timeText = document.getElementById('timeText');
  const period = hour < 12 ? '上午' : '下午';
  const displayHour = hour % 12 || 12;
  timeText.textContent = `${period} ${padZero(displayHour)}:${padZero(minute)}`;
}

updateClock();
setInterval(updateClock, 1000);

Object.values(CLOCK_ICONS).forEach(url => {
  const img = new Image();
  img.src = url;
});

function getTimeType() {
  const hour = new Date().getHours()
  if (hour >= 7 && hour < 15) {
    return "day"
  } else if (hour >= 15 && hour < 19) {
    return "evening"
  } else {
    return "night"
  }
}

const UI_MAP = {
  day: [
    "https://i.ibb.co/2GyGQtz/IMG-4785.jpg",
    "https://i.ibb.co/TxkckTRt/IMG-4786.jpg",
    "https://i.ibb.co/xtv6DBbr/IMG-4787.jpg"
  ],
  evening: [
    "https://i.ibb.co/YBfn3byB/IMG-4788.jpg"
  ],
  night: [
    "https://i.ibb.co/v6KSLczf/IMG-4789.jpg",
    "https://i.ibb.co/fzPDWPVV/IMG-4790.jpg",
    "https://i.ibb.co/1Yx4Z9YX/IMG-4791.jpg"
  ]
}

function getRandomUI() {
  const type = getTimeType()
  const list = UI_MAP[type]
  const index = Math.floor(Math.random() * list.length)
  return list[index]
}

function setBackground() {
  const bg = getRandomUI()
  document.body.style.backgroundImage = `url(${bg})`
}

setBackground()

function updateStatusByTime() {
  const hour = new Date().getHours()
  if (hour >= 7 && hour <= 9) {
    mood -= 10
    sleepiness += 20
  }
  if (hour >= 22) {
    sleepiness += 15
  }
  if ((hour >= 11 && hour <= 13) || (hour >= 18 && hour <= 19)) {
    hunger += 20
  }
  mood = Math.max(-30, Math.min(100, mood))
  energy = Math.max(0, Math.min(100, energy))
  hunger = Math.max(0, Math.min(100, hunger))
  sleepiness = Math.max(0, Math.min(100, sleepiness))
}

let mood = 70
let energy = 60
let hunger = 50
let sleepiness = 30

updateStatusByTime()

function updateHomeStats() {
  const moodEl = document.getElementById('statMood');
  const energyEl = document.getElementById('statEnergy');
  const sleepEl = document.getElementById('statSleepiness');
  const hungerEl = document.getElementById('statHunger');
  if (moodEl) moodEl.textContent = mood;
  if (energyEl) energyEl.textContent = energy;
  if (sleepEl) sleepEl.textContent = sleepiness;
  if (hungerEl) hungerEl.textContent = hunger;
}

document.body.addEventListener("click", () => {
  const action = Math.floor(Math.random() * 3)
  if (action === 0) {
    hunger -= 20
    mood += 5
  } else if (action === 1) {
    sleepiness -= 30
    energy += 20
  } else {
    mood += 10
    energy -= 5
  }
  updateStatusByTime()
  showStatus()
})

function showStatus() {
  let box = document.getElementById("statusBox")
  if (!box) {
    box = document.createElement("div")
    box.id = "statusBox"
    box.style.position = "fixed"
    box.style.top = "20px"
    box.style.left = "20px"
    box.style.padding = "10px 15px"
    box.style.background = "rgba(0,0,0,0.5)"
    box.style.color = "#fff"
    box.style.borderRadius = "10px"
    box.style.fontSize = "14px"
    document.body.appendChild(box)
  }
  box.innerHTML = `
  心情:${mood}<br>
  精力:${energy}<br>
  饥饿:${hunger}<br>
  困意:${sleepiness}
  `
  updateHomeStats();
}

showStatus()

function openPanel(panelId) {
  document.querySelectorAll('.interactive-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById(panelId);
  if (panel) panel.classList.add('active');
}

function closePanel(panelId) {
  const panel = document.getElementById(panelId);
  if (panel) panel.classList.remove('active');
}

function closeAllPanels() {
  document.querySelectorAll('.interactive-panel').forEach(p => p.classList.remove('active'));
}

document.getElementById('btnHome').addEventListener('click', (e) => {
  e.stopPropagation();
  openPanel('panelHome');
});

document.getElementById('btnGoOut').addEventListener('click', (e) => {
  e.stopPropagation();
  openPanel('panelGoOut');
});

document.getElementById('btnFamily').addEventListener('click', (e) => {
  e.stopPropagation();
  openPanel('panelFamily');
});

document.getElementById('btnKitty').addEventListener('click', (e) => {
  e.stopPropagation();
  openPanel('panelKitty');
  initPhoneApp();
});

document.querySelectorAll('.panel-close').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();

// 购物车
let cart = [];
let currentShop = null;

// 初始化手机应用
function initPhoneApp() {
  renderShopList();
}

// 渲染店铺列表
function renderShopList() {
  const shopList = document.getElementById('shopList');
  shopList.innerHTML = '';
  
  SHOPS.forEach(shop => {
    const item = document.createElement('button');
    item.className = 'shop-item';
    item.onclick = (e) => {
      e.stopPropagation();
      openShop(shop.id);
    };
    shopList.appendChild(item);
  });
}

// 打开店铺
function openShop(shopId) {
  currentShop = shopId;
  renderProductList(shopId);
  switchPage('pageProductList');
}

// 渲染商品列表
function renderProductList(shopId) {
  const productGrid = document.getElementById('productGrid');
  productGrid.innerHTML = '';
  
  const products = PRODUCTS[shopId] || PRODUCTS.bento;
  
  products.forEach(product => {
    const item = document.createElement('button');
    item.className = 'product-item';
    item.innerHTML = `<img src="${product.image}" alt="${product.name}">`;
    item.onclick = (e) => {
      e.stopPropagation();
      addToCart(product);
    };
    productGrid.appendChild(item);
  });
}

// 添加到购物车
function addToCart(product) {
  cart.push(product);
  updateCartBadge();
  showMiniPopup('已加入购物车');
  
  // 更新状态
  hunger -= 5;
  mood += 3;
  showStatus();
}

// 更新购物车角标
function updateCartBadge() {
  const badge = document.getElementById('cartBadge');
  if (cart.length > 0) {
    badge.style.display = 'flex';
    badge.textContent = cart.length;
  } else {
    badge.style.display = 'none';
  }
}

// 显示小提示
function showMiniPopup(message) {
  const popup = document.getElementById('miniPopup');
  popup.textContent = message;
  popup.classList.add('show');
  
  setTimeout(() => {
    popup.classList.remove('show');
  }, 1500);
}

// 切换页面
function switchPage(pageId) {
  document.querySelectorAll('.phone-page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
}

// 结算页面
function openCheckout() {
  if (cart.length === 0) {
    showMiniPopup('购物车是空的');
    return;
  }
  
  renderCheckout();
  switchPage('pageCheckout');
}

// 渲染结算内容
function renderCheckout() {
  const content = document.getElementById('checkoutContent');
  const total = cart.reduce((sum, item) => sum + item.price, 0);
  
  content.innerHTML = `
    <div style="padding: 20px; color: #333;">
      <h3 style="text-align: center; margin-bottom: 20px;">我的订单</h3>
      ${cart.map(item => `
        <div style="display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee;">
          <span>${item.name}</span>
          <span>¥${item.price}</span>
        </div>
      `).join('')}
      <div style="margin-top: 20px; text-align: right; font-size: 18px; font-weight: bold;">
        总计: ¥${total}
      </div>
    </div>
  `;
}

// 确认支付
function confirmPayment() {
  switchPage('pageSuccess');
  
  // 3秒后自动返回首页
  setTimeout(() => {
    resetPhone();
  }, 3000);
}

// 重置手机状态
function resetPhone() {
  cart = [];
  currentShop = null;
  updateCartBadge();
  switchPage('pageShopList');
}
