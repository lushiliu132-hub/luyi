<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>像素生活UI</title>
<style>
body {
  margin: 0;
  height: 100vh;

  /* 背景图片设置 */
  background-image: 
    url("https://i.ibb.co/PzPCwYPM/IMG-4755.png"),  /* 背景 */
    none;
  background-repeat: 
    repeat,   /* 背景平铺 */
    no-repeat;
  background-position: 
    center,   /* 背景居中 */
    center top;
  background-size: 
    cover,   /* 背景图覆盖整个页面 */
    100% auto; /* UI图不裁，按比例居中 */
  background-color: #000;
  transition: background-image 0.5s ease;
}

/* UI图片容器 */
.ui-image {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%); /* 居中 */
  z-index: 1;  /* 确保UI图在背景图上面 */
}
</style>
</head>
<body>

<!-- UI 图片显示区域 -->
<img src="https://i.ibb.co/RTRM2Y5Z/IMG-4364.jpg" class="ui-image" alt="UI图" id="ui-img">

<script>
// ===== 时间判断 =====
function getTimeType() {
  const hour = new Date().getHours();

  if (hour >= 7 && hour < 15) {
    return "day";
  } else if (hour >= 15 && hour < 19) {
    return "evening";
  } else {
    return "night";
  }
}

// ===== UI图片 =====
const UI_MAP = {
  day: [
    "https://i.ibb.co/RTRM2Y5Z/IMG-4364.jpg", // 站立
    "https://i.ibb.co/qLDQjN9f/IMG-4370.jpg", // 吃饭
    "https://i.ibb.co/v6PDRSSg/IMG-4376.jpg"  // 睡觉
  ],
  evening: [
    "https://i.ibb.co/p6cXrycC/IMG-4372.jpg" // 傍晚
  ],
  night: [
    "https://i.ibb.co/35m6d0j8/IMG-4374.jpg",
    "https://i.ibb.co/p6yjz7jy/IMG-4373.jpg",
    "https://i.ibb.co/YTkBwMfs/IMG-4377.jpg"
  ]
}

// ===== 随机选图 =====
function getRandomUI() {
  const type = getTimeType();
  const list = UI_MAP[type];
  const index = Math.floor(Math.random() * list.length);
  return list[index];
}

// ===== 设置背景（只换第二层）=====
function setBackground() {
  const bg = getRandomUI();
  document.body.style.backgroundImage = `
    url("https://i.ibb.co/PzPCwYPM/IMG-4755.png"),
    url(${bg})
  `;
}

// ===== 初始加载 =====
setBackground();

// ===== 每10分钟刷新 =====
setInterval(() => {
  setBackground();
}, 10 * 60 * 1000);
</script>

</body>
</html>
