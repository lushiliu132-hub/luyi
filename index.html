<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>璐小家</title>

<style>
body{
  margin:0;
  height:100vh;
  position: relative;
  background-size: 100% auto;
  background-repeat: no-repeat;
  background-position: center top;
  background-color: #000;
  transition:background-image 0.5s ease;
}

/* 底纹层 */
body::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: url('https://i.ibb.co/PzPCwYPM/IMG-4755.png');
  background-repeat: repeat;
  background-size: auto;
  opacity: 0.15;
  z-index: -1;
  pointer-events: none;
}

/* 时钟组件容器 */
#clockWidget {
  position: fixed;
  top: 8px;
  right: 18px;
  z-index: 1000;
  width: 170px;
  height: auto;
}
#clockWidget img {
  width: 100%;
  height: auto;
  display: block;
}

/* 时间文字覆盖层 */
.clock-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
.date-text {
  position: absolute;
  top: 10%;
  left: 45%;
  font-family: "Microsoft YaHei", "SimHei", sans-serif;
  font-size: 11px;
  font-weight: bold;
  color: #3a2415;
  text-align: left;
  letter-spacing: 0.5px;
}
.time-text {
  position: absolute;
  top: 50%;
  left: 45%;
  font-family: "Arial", "Microsoft YaHei", sans-serif;
  font-size: 14px;
  font-weight: bold;
  color: #3a2415;
  letter-spacing: 1px;
}

/* 交互按钮 */
.interactive-btn {
  position: fixed;
  border: none;
  cursor: pointer;
  z-index: 100;
  padding: 0;
  background: transparent;
  transition: transform 0.2s, opacity 0.2s;
}
.interactive-btn img {
  width: 100%;
  height: 100%;
  display: block;
}
.interactive-btn:hover {
  transform: scale(1.05);
  opacity: 0.9;
}
.interactive-btn:active {
  transform: scale(0.95);
  opacity: 0.8;
}
#btnGoOut { top: 12px; left: 55px; width: 82px; height: 34px; }
#btnFamily { top: 12px; left: 128px; width: 115px; height: 34px; }
#btnHome { top: 12px; right: 210px; width: 82px; height: 34px; }
#btnKitty { top: 140px; right: 50px; width: 78px; height: 95px; }

@media (max-width: 600px) {
  #clockWidget { width: 130px; top: 6px; right: 6px; }
  .date-text { font-size: 9px; }
  .time-text { font-size: 11px; }
  #btnGoOut { top: 14px; left: 10px; width: 68px; height: 28px; }
  #btnFamily { top: 14px; left: 82px; width: 92px; height: 28px; }
  #btnHome { top: 14px; right: 140px; width: 68px; height: 28px; }
  #btnKitty { top: 115px; right: 10px; width: 55px; height: 70px; }
}

/* ===== 隐藏左上角心情状态框 ===== */
#statusBox {
  display: none !important;
}

/* ===== 互动面板 ===== */
.interactive-panel {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 2000;
  display: none;
  justify-content: center;
  align-items: center;
}
.interactive-panel.active { display: flex; }

.panel-content {
  position: relative;
  display: inline-block;
  max-width: 90vw;
  max-height: 85vh;
}
.panel-bg {
  display: block;
  max-width: 90vw;
  max-height: 85vh;
  width: auto;
  height: auto;
  object-fit: contain;
}
.panel-close {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 42px;
  height: 42px;
  border: none;
  background: transparent;
  cursor: pointer;
  z-index: 2001;
  padding: 0;
  transition: transform 0.2s;
}
.panel-close:hover { transform: scale(1.1); }
.panel-close:active { transform: scale(0.92); }

/* 主页面板 */
#panelHome { align-items: flex-start; padding-top: 2vh; }
.home-stats-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 10;
  font-family: "SimHei", "Microsoft YaHei", "Heiti SC", sans-serif;
  font-weight: bold;
  color: #5c3a1e;
}
.home-left-col {
  position: absolute;
  top: 10%;
  left: 46%;
  font-size: clamp(9px, 1.8vw, 12px);
  line-height: 1.5;
  white-space: nowrap;
}
.home-right-col {
  position: absolute;
  top: 29%;
  left: 46%;
  font-size: clamp(9px, 1.8vw, 12px);
  line-height: 1.5;
  white-space: nowrap;
}

/* ===== 小手机面板专用样式 ===== */
#panelKitty {
  align-items: center;
  justify-content: center;
  padding: 2vh 0;
}

#panelKitty .panel-content {
  width: 360px;
  aspect-ratio: 9 / 18;
  position: fixed;
  top: 50px;
  left: 20%;
  transform: scale(0.4);
  transform-origin: top left;
  will-change: transform;
  z-index: 999;
  touch-action: none;
  /* 关键修复：裁剪溢出内容并添加圆角匹配手机边框 */
  overflow: hidden;
  border-radius: 40px;
}

/* 手机边框 */
.phone-frame {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover; /* 改为 cover 确保完全覆盖，不留缝隙 */
  pointer-events: none;
  z-index: 100;
}

/* 手机屏幕内容区 */
.phone-screen {
  position: absolute;
  /* 微调百分比让屏幕更贴合边框内部 */
  top: 6%;
  left: 7%;
  width: 86%;
  height: 88%;
  overflow: hidden;
  background: #ffe6f0;
  border-radius: 28px; /* 调整圆角匹配边框 */
}

/* 小手机关闭按钮（返回主界面） */
.phone-close-btn {
  position: absolute;
  top: 1.2%;
  right: 2.5%;
  width: 26px;
  height: 26px;
  background: rgba(255,255,255,0.85);
  border: none;
  border-radius: 50%;
  cursor: pointer;
  z-index: 250;
  font-size: 16px;
  line-height: 1;
  color: #ff6b6b;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}
.phone-close-btn:hover {
  background: #fff;
  transform: scale(1.1);
}

/* 小手机内的各个界面 */
.phone-page {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background-size: cover;
  background-position: center;
  overflow: hidden;
}
.phone-page.active {
  display: block;
}

/* ===== 手机桌面 ===== */
.desktop-bg {
  width: 100%;
  height: 100%;
  background-image: url('https://i.ibb.co/PsVnB5SK/IMG-4883.jpg');
  background-size: cover;
  background-position: center;
  position: relative;
  overflow: hidden;
}

/* 时间显示 */
.desktop-time {
  position: absolute;
  top: 3%;
  left: 0;
  width: 100%;
  text-align: center;
  font-family: "Arial", sans-serif;
  font-size: clamp(26px, 7vw, 38px);
  font-weight: bold;
  color: #5a3e36;
  text-shadow: 1px 1px 2px rgba(255,255,255,0.6);
  letter-spacing: 2px;
  z-index: 10;
}

/* Widget区域 */
.desktop-widgets {
  position: absolute;
  top: 12%;
  left: 8%;
  width: 84%;
  height: 16%;
  display: flex;
  gap: 8px;
  z-index: 10;
}

.widget-box {
  flex: 1;
  background: rgba(255,255,255,0.55);
  border-radius: 14px;
  backdrop-filter: blur(4px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: #666;
  padding: 4px;
  text-align: center;
}

.widget-box .widget-icon {
  font-size: 24px;
  margin-bottom: 4px;
}

/* APP图标网格 */
.app-grid {
  position: absolute;
  top: 32%;
  left: 8%;
  width: 84%;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px 8px;
  z-index: 10;
}

.app-icon {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 4px;
  transition: transform 0.2s;
}
.app-icon:hover {
  transform: scale(1.08);
}
.app-icon:active {
  transform: scale(0.95);
}

.app-icon-static {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 4px;
  transition: transform 0.2s;
  pointer-events: none;
  opacity: 0.7;
}
.app-icon-static:hover {
  transform: scale(1.08);
}
.app-icon-static:active {
  transform: scale(0.95);
}

.app-icon-img {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  object-fit: cover;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}

.app-icon-label {
  font-size: 10px;
  color: #fff;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
  font-weight: bold;
  white-space: nowrap;
}

/* 底部Dock */
.dock {
  position: absolute;
  bottom: 4%;
  left: 12%;
  width: 76%;
  height: 12%;
  background: rgba(255,255,255,0.4);
  border-radius: 18px;
  backdrop-filter: blur(6px);
  display: flex;
  justify-content: space-around;
  align-items: center;
  z-index: 10;
  padding: 0 10px;
}

.dock-icon {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 2px;
  transition: transform 0.2s;
}
.dock-icon:hover {
  transform: scale(1.1);
}

.dock-icon-img {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  object-fit: cover;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}

.dock-icon-label {
  font-size: 9px;
  color: #fff;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
}

/* ===== 外卖界面 ===== */
.takeout-bg {
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  position: relative;
}

/* 外卖返回按钮（返回桌面） */
.takeout-back {
  position: absolute;
  top: 1.5%;
  right: 3%;
  width: 28px;
  height: 28px;
  background: rgba(255,107,107,0.9);
  border: 2px solid #fff;
  border-radius: 50%;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  transition: transform 0.2s;
}
.takeout-back:hover {
  transform: scale(1.1);
}

/* 分类标签 */
.category-tabs {
  position: absolute;
  top: 9%;
  left: 5%;
  width: 90%;
  height: 8%;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 4px;
  z-index: 20;
}

.tab-btn {
  flex: 1;
  height: 85%;
  background: rgba(255,255,255,0.6);
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: bold;
  color: #666;
  cursor: pointer;
  transition: all 0.2s;
  padding: 0;
}
.tab-btn.active {
  background: #ff8c42;
  color: #fff;
  box-shadow: 0 2px 6px rgba(255,140,66,0.4);
}
.tab-btn:hover {
  transform: translateY(-1px);
}

/* 店铺列表 */
.shop-list {
  position: absolute;
  top: 19%;
  left: 6%;
  width: 88%;
  height: 62%;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 20;
  padding-right: 2px;
}

.shop-item {
  display: flex;
  align-items: center;
  gap: 10px;
  height: 15%;
  min-height: 50px;
  background: rgba(255,255,255,0.85);
  border: none;
  border-radius: 10px;
  padding: 6px 12px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  text-align: left;
  flex-shrink: 0;
}
.shop-item:hover {
  transform: scale(1.02);
  box-shadow: 0 3px 10px rgba(0,0,0,0.12);
}
.shop-item:active {
  transform: scale(0.98);
}

.shop-item img {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  object-fit: cover;
  flex-shrink: 0;
}

.shop-info {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.shop-name {
  font-size: 13px;
  font-weight: bold;
  color: #333;
}

.shop-meta {
  font-size: 10px;
  color: #999;
}

.shop-price {
  font-size: 12px;
  color: #ff6b6b;
  font-weight: bold;
  flex-shrink: 0;
}

.shop-item.disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.shop-item.disabled:hover {
  transform: none;
  box-shadow: none;
}

/* 外卖底部栏 */
.takeout-footer {
  position: absolute;
  bottom: 2%;
  left: 6%;
  width: 88%;
  height: 12%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 20;
  gap: 8px;
}

.cart-info {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  height: 85%;
  background: rgba(255,255,255,0.85);
  border-radius: 10px;
  padding: 0 10px;
  font-size: 12px;
  color: #666;
}

.cart-info .cart-count {
  background: #ff6b6b;
  color: #fff;
  border-radius: 50%;
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: bold;
}

.checkout-btn {
  height: 85%;
  padding: 0 16px;
  background: linear-gradient(135deg, #ff8c42, #ff6b35);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  white-space: nowrap;
}
.checkout-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(255,107,53,0.4);
}
.checkout-btn:active {
  transform: scale(0.95);
}

/* ===== 商品列表界面 ===== */
.shop-bg {
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  position: relative;
}

/* 顶部返回 */
.shop-header {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 10%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 4%;
  z-index: 30;
}

.shop-header .back-arrow {
  width: 32px;
  height: 32px;
  background: rgba(255,255,255,0.85);
  border: none;
  border-radius: 50%;
  font-size: 18px;
  color: #ff8c42;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  transition: transform 0.2s;
}
.shop-header .back-arrow:hover {
  transform: scale(1.1);
}

.shop-header .shop-title {
  font-size: 16px;
  font-weight: bold;
  color: #fff;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

/* 商品标签 */
.product-tabs {
  position: absolute;
  top: 22%;
  left: 8%;
  width: 84%;
  height: 7%;
  display: flex;
  z-index: 20;
}

.product-tab {
  flex: 1;
  background: transparent;
  border: none;
  font-size: 12px;
  font-weight: bold;
  color: #999;
  cursor: pointer;
  padding: 0;
  transition: color 0.2s;
}
.product-tab.active {
  color: #ff8c42;
}
.product-tab:hover {
  color: #ff8c42;
}

/* 商品网格 */
.product-grid {
  position: absolute;
  top: 30%;
  left: 8%;
  width: 84%;
  height: 52%;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  overflow-y: auto;
  z-index: 20;
  padding-bottom: 8px;
}

.product-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: rgba(255,248,220,0.9);
  border: none;
  border-radius: 10px;
  padding: 6px 4px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.product-item:hover {
  transform: scale(1.05);
  box-shadow: 0 3px 10px rgba(0,0,0,0.15);
}
.product-item:active {
  transform: scale(0.95);
}

.product-item img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  border-radius: 8px;
}

.product-price {
  font-size: 11px;
  font-weight: bold;
  color: #ff6b6b;
}

/* 商品列表底部导航 */
.shop-nav {
  position: absolute;
  bottom: 2%;
  left: 5%;
  width: 90%;
  height: 10%;
  display: flex;
  justify-content: space-around;
  align-items: center;
  z-index: 20;
  gap: 6px;
}

.shop-nav-btn {
  flex: 1;
  height: 85%;
  background: linear-gradient(135deg, #ff8c42, #ff6b35);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 0;
  transition: transform 0.2s;
}
.shop-nav-btn:hover {
  transform: translateY(-2px);
}
.shop-nav-btn:active {
  transform: scale(0.95);
}
.shop-nav-btn.secondary {
  background: rgba(255,255,255,0.85);
  color: #ff8c42;
  border: 1px solid #ff8c42;
}

/* ===== 购物车弹窗 ===== */
.popup-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.45);
  z-index: 100;
  display: none;
  justify-content: center;
  align-items: center;
}
.popup-overlay.active {
  display: flex;
}

.popup-content {
  position: relative;
  width: 92%;
  max-height: 75%;
  background-size: cover;
  background-position: center;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.popup-close {
  position: absolute;
  top: 3%;
  right: 3%;
  width: 26px;
  height: 26px;
  background: rgba(255,255,255,0.9);
  border: none;
  border-radius: 50%;
  font-size: 14px;
  color: #ff6b6b;
  cursor: pointer;
  z-index: 110;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  transition: transform 0.2s;
}
.popup-close:hover {
  transform: scale(1.1);
}

/* 购物车内容 */
.cart-body {
  padding: 14% 6% 16% 6%;
  height: 100%;
  display: flex;
  flex-direction: column;
}

.cart-title {
  font-size: 15px;
  font-weight: bold;
  color: #333;
  text-align: center;
  margin-bottom: 10px;
}

.cart-list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.cart-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(255,255,255,0.7);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 12px;
}

.cart-item-name {
  color: #333;
  font-weight: bold;
}

.cart-item-price {
  color: #ff6b6b;
  font-weight: bold;
}

.cart-footer {
  margin-top: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 8px;
  border-top: 1px dashed #ccc;
}

.cart-total {
  font-size: 14px;
  font-weight: bold;
  color: #333;
}

.cart-total span {
  color: #ff6b6b;
  font-size: 16px;
}

.pay-btn {
  padding: 8px 20px;
  background: linear-gradient(135deg, #ff8c42, #ff6b35);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.2s;
}
.pay-btn:hover {
  transform: scale(1.05);
}
.pay-btn:active {
  transform: scale(0.95);
}

/* 支付成功弹窗 */
.success-body {
  padding: 16% 8% 12% 8%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  text-align: center;
}

.success-title {

  evening: 'https://i.ibb.co/xtdH3Mpt/IMG-4773.png'
};

function getBeijingTime() {
  const now = new Date();
  const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
  return new Date(utc + (3600000 * 8));
}

function padZero(num) { return num.toString().padStart(2, '0'); }

function getWeekDayText(day) {
  const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
  return weekDays[day];
}

function updateClock() {
  const beijingTime = getBeijingTime();
  const hour = beijingTime.getHours();
  const minute = beijingTime.getMinutes();
  const date = beijingTime.getDate();
  const day = beijingTime.getDay();

  let sceneType;
  if (hour >= 7 && hour < 15) sceneType = 'day';
  else if (hour >= 15 && hour < 19) sceneType = 'evening';
  else sceneType = 'night';

  document.getElementById('clockIcon').src = CLOCK_ICONS[sceneType];
  document.getElementById('dateText').textContent = `${getWeekDayText(day)} ${padZero(date)}日`;

  const period = hour < 12 ? '上午' : '下午';
  const displayHour = hour % 12 || 12;
  document.getElementById('timeText').textContent = `${period} ${padZero(displayHour)}:${padZero(minute)}`;
}

updateClock();
setInterval(updateClock, 1000);

Object.values(CLOCK_ICONS).forEach(url => { const img = new Image(); img.src = url; });

function getTimeType() {
  const hour = new Date().getHours();
  if (hour >= 7 && hour < 15) return "day";
  else if (hour >= 15 && hour < 19) return "evening";
  else return "night";
}

const UI_MAP = {
  day: ["https://i.ibb.co/2GyGQtz/IMG-4785.jpg", "https://i.ibb.co/TxkckTRt/IMG-4786.jpg", "https://i.ibb.co/xtv6DBbr/IMG-4787.jpg"],

};

function getRandomUI() {
  const type = getTimeType();
  const list = UI_MAP[type];
  return list[Math.floor(Math.random() * list.length)];
}

function setBackground() {
  document.body.style.backgroundImage = `url(${getRandomUI()})`;
}
setBackground();

function updateStatusByTime() {
  const hour = new Date().getHours();
  if (hour >= 7 && hour <= 9) { mood -= 10; sleepiness += 20; }
  if (hour >= 22) sleepiness += 15;
  if ((hour >= 11 && hour <= 13) || (hour >= 18 && hour <= 19)) hunger += 20;
  mood = Math.max(-30, Math.min(100, mood));
  energy = Math.max(0, Math.min(100, energy));
  hunger = Math.max(0, Math.min(100, hunger));
  sleepiness = Math.max(0, Math.min(100, sleepiness));
}

// 购物车状态
let cart = [];

function renderShops(category) {
  const shopList = document.getElementById('shopList');
  const shops = SHOPS_DATA[category] || [];
  shopList.innerHTML = shops.map(shop => `
    <button class="shop-item ${shop.disabled ? 'disabled' : ''}" data-shop="${shop.id}" ${shop.disabled ? 'disabled' : ''}>
      <img src="${shop.image}" alt="${shop.name}">
      <div class="shop-info">
        <div class="shop-name">${shop.name}</div>
        <div class="shop-meta">${shop.time}</div>
      </div>
      <div class="shop-price">${shop.price}</div>
    </button>
  `).join('');

  shopList.querySelectorAll('.shop-item:not(.disabled)').forEach(item => {
    item.addEventListener('click', () => {
      const shopId = item.dataset.shop;
      openShop(shopId, item.querySelector('.shop-name').textContent);
    });
  });
}

function openShop(shopId, shopName) {
  document.querySelectorAll('.phone-page').forEach(p => p.classList.remove('active'));
  document.getElementById('pageShop').classList.add('active');
  document.getElementById('currentShopName').textContent = shopName;
  renderProducts(shopId);
}

function renderProducts(shopId) {
  const productGrid = document.getElementById('productGrid');
  const products = PRODUCTS_DATA[shopId] || [];
  productGrid.innerHTML = products.map(product => `
    <button class="product-item" data-product="${product.id}" data-name="${product.name}" data-price="${product.price}">
      <img src="${product.image}" alt="${product.name}">
      <div style="font-size:11px;font-weight:bold;color:#333;">${product.name}</div>
      <div class="product-price">¥${product.price}</div>
    </button>
  `).join('');

  productGrid.querySelectorAll('.product-item').forEach(item => {
    item.addEventListener('click', () => {
      const name = item.dataset.name;
      const price = parseInt(item.dataset.price);
      addToCart(name, price);
      showMiniToast(`已添加 ${name}`);
    });
  });
}

function addToCart(name, price) {
  const existingItem = cart.find(item => item.name === name);
  if (existingItem) {
    existingItem.quantity += 1;
  } else {
    cart.push({ name, price, quantity: 1 });
  }
  updateCartCount();
}

function updateCartCount() {
  const cartCount = document.getElementById('takeoutCartCount');
  if (cartCount) {
    cartCount.textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
  }
}

function showCart() {
  const cartList = document.getElementById('cartList');
  const cartTotalPrice = document.getElementById('cartTotalPrice');

  if (cart.length === 0) {
    cartList.innerHTML = '<div style="text-align:center;color:#999;padding:20px;">购物车是空的</div>';
    cartTotalPrice.textContent = '¥0';
  } else {
    cartList.innerHTML = cart.map(item => `
      <div class="cart-item">
        <span class="cart-item-name">${item.name} x${item.quantity}</span>
        <span class="cart-item-price">¥${item.price * item.quantity}</span>
      </div>
    `).join('');
    const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
    cartTotalPrice.textContent = `¥${total}`;
  }

  document.getElementById('cartPopupOverlay').classList.add('active');
}

function showMiniToast(message) {
  const miniToast = document.getElementById('miniToast');
  miniToast.textContent = message;
  miniToast.classList.add('show');
  setTimeout(() => {
    miniToast.classList.remove('show');
  }, 1200);
}

function showAppToast(message) {
  const appToast = document.getElementById('appToast');
  appToast.textContent = message;
  appToast.classList.add('show');
  setTimeout(() => {
    appToast.classList.remove('show');
  }, 1500);
}

  const minutes = padZero(now.getMinutes());
  const desktopTime = document.getElementById('desktopTime');
  if (desktopTime) {
    desktopTime.textContent = `${hours}:${minutes}`;

}
