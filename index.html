<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>璐小家</title>
  <style>
    /* 添加按钮样式 */
    .interactive-button {
      position: absolute;
      z-index: 1000;
      padding: 10px 20px;
      background-color: rgba(255, 255, 255, 0.8);
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      color: #333;
    }
    /* 具体位置 */
    #homeButton {
      top: 50px;
      left: 20px;
    }
    #outButton {
      top: 50px;
      left: 100px;
    }
    #familyButton {
      top: 50px;
      left: 200px;
    }
    #kittyButton {
      top: 50px;
      left: 300px;
    }
  </style>
</head>
<body>

  <!-- 交互按钮 -->
  <div id="homeButton" class="interactive-button" onclick="showPanel('home')">主页</div>
  <div id="outButton" class="interactive-button" onclick="showPanel('out')">外出</div>
  <div id="familyButton" class="interactive-button" onclick="showPanel('family')">家庭成员</div>
  <div id="kittyButton" class="interactive-button" onclick="showPanel('kitty')">kitty手机连接</div>

  <!-- 显示面板 -->
  <div id="panel" style="text-align: center; padding-top: 100px;">
    <img id="home" src="https://i.ibb.co/V0JkwTmM/IMG-4779.jpg" alt="主页" style="display: none; width: 80%;">
    <img id="out" src="https://i.ibb.co/ksckdZsy/IMG-4777.jpg" alt="外出" style="display: none; width: 80%;">
    <img id="family" src="https://i.ibb.co/FbNs95S9/IMG-4778.jpg" alt="家庭成员" style="display: none; width: 80%;">
    <img id="kitty" src="https://i.ibb.co/XxwWKQDr/IMG-4806.png" alt="kitty手机连接" style="display: none; width: 80%;">
  </div>

  <script>
    function showPanel(panelId) {
      // 隐藏所有面板
      const panels = document.querySelectorAll('#panel img');
      panels.forEach((panel) => {
        panel.style.display = 'none';
      });

      // 显示选中的面板
      const selectedPanel = document.getElementById(panelId);
      if (selectedPanel) {
        selectedPanel.style.display = 'block';
      }
    }
  </script>

</body>
</html>
