<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>璐小家</title>
<style>
  /* 基础样式 */
  body {
    margin: 0;
    height: 100vh;
    background-color: #000;
  }

  /* 时钟 */
  #clockWidget {
    position: fixed;
    top: 8px;
    right: 18px;
    z-index: 1000;
  }

  .interactive-btn {
    position: fixed;
    z-index: 100;
    padding: 0;
    background: transparent;
    border: none;
    cursor: pointer;
  }

  /* 互动面板 */
  .interactive-panel {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 2000;
    display: none;
    justify-content: center;
    align-items: center;
  }

  .interactive-panel.active {
    display: flex;
  }

  /* 外卖界面 */
  .takeout-bg {
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    position: relative;
    background-image: url('https://i.ibb.co/6JpG9rHd/IMG-4889.jpg');
  }

  /* 页面切换 */
  .phone-page {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    background-size: cover;
    background-position: center;
  }

  .phone-page.active {
    display: block;
  }
</style>
</head>
<body>

<!-- 时钟组件 -->
<div id="clockWidget">
  <div id="timeText">08:33</div>
</div>

<!-- 交互按钮 -->
<button class="interactive-btn" id="btnGoOut">外出</button>
<button class="interactive-btn" id="btnFamily">家庭成员</button>
<button class="interactive-btn" id="btnHome">主页</button>
<button class="interactive-btn" id="btnKitty">Kitty手机</button>

<!-- 外卖界面 -->
<div id="panelTakeout" class="interactive-panel">
  <div class="takeout-bg">
    <button class="takeout-back" id="backToDesktop">返回桌面</button>
    <div class="category-tabs">
      <button class="tab-btn active" data-cat="hot">热销</button>
      <button class="tab-btn" data-cat="food">美食</button>
    </div>
    <div class="shop-list" id="shopList"></div>
  </div>
</div>

<!-- 小手机面板 -->
<div id="panelKitty" class="interactive-panel">
  <div class="panel-content">
    <!-- 其他内容 -->
  </div>
</div>

<script>
  // 切换手机页面
  function switchPhonePage(pageId) {
    document.querySelectorAll('.phone-page').forEach(p => p.classList.remove('active'));
    const page = document.getElementById(pageId);
    if (page) page.classList.add('active');
  }

  // 切换外卖页面
  document.getElementById('btnKitty').addEventListener('click', () => {
    openPanel('panelKitty');
  });

  // 外卖界面分类切换
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderShopList(btn.dataset.cat);
    });
  });

  // 渲染店铺列表
  const SHOPS_DATA = {
    hot: [
      { id: 'bento', name: '便当小铺', image: 'https://i.ibb.co/fGN8301V/IMG-4851.png', time: '45分钟送达', price: '¥20起' },
      { id: 'milk_tea', name: '喝点奶茶', image: 'https://i.ibb.co/9kqHmwng/IMG-4852.png', time: '45分钟送达', price: '¥20起' },
    ],
    food: [
      { id: 'bento', name: '便当小铺', image: 'https://i.ibb.co/fGN8301V/IMG-4851.png', time: '45分钟送达', price: '¥20起' },
      { id: 'milk_tea', name: '喝点奶茶', image: 'https://i.ibb.co/9kqHmwng/IMG-4852.png', time: '45分钟送达', price: '¥20起' },
    ]
  };

  // 渲染店铺列表
  function renderShopList(category) {
    const container = document.getElementById('shopList');
    container.innerHTML = '';
    const shops = SHOPS_DATA[category] || SHOPS_DATA.hot;

    shops.forEach(shop => {
      const item = document.createElement('button');
      item.className = 'shop-item';
      item.innerHTML = `
        <img src="${shop.image}" alt="${shop.name}">
        <div class="shop-info">
          <div class="shop-name">${shop.name}</div>
          <div class="shop-meta">${shop.time}</div>
        </div>
        <div class="shop-price">${shop.price}</div>
      `;
      item.onclick = () => openShop(shop.id, shop.name);
      container.appendChild(item);
    });
  }

  // 打开店铺
  function openShop(shopId, shopName) {
    alert(`打开店铺: ${shopName}`);
  }

  // 切换面板
  function openPanel(panelId) {
    document.querySelectorAll('.interactive-panel').forEach(p => p.classList.remove('active'));
    const panel = document.getElementById(panelId);
    if (panel) panel.classList.add('active');
  }

  // 初始化
  function init() {
    renderShopList('hot');
  }

  init();
</script>

</body>
</html>
