<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>璐小家</title>

<style>
body{
  margin:0;
  height:100vh;
  position: relative;

  background-size: 100% auto;
  background-repeat: no-repeat;
  background-position: center top;
  background-color: #000;

  transition:background-image 0.5s ease;
}

body::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: url('https://i.ibb.co/PzPCwYPM/IMG-4755.png');
  background-repeat: repeat;
  background-size: auto;
  opacity: 0.15;
  z-index: -1;
  pointer-events: none;
}

/* 时钟容器 - 文字叠加在图标上 */
.clock-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 9999;
  width: 100px;
  height: 100px;
}

/* 时钟图标背景 */
.clock-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
}

/* 时钟文字层 */
.clock-text-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  width: 100%;
}

.weekday-display {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 2px;
}

.date-display {
  font-size: 18px;
  font-weight: 400;
  margin-bottom: 2px;
}

.period-display {
  font-size: 12px;
  font-weight: 400;
  margin-bottom: 2px;
  color: #f0f0f0;
}

.time-display {
  font-size: 28px;
  font-weight: 300;
  letter-spacing: 1px;
}

.percentage-display {
  font-size: 12px;
  font-weight: 400;
  color: #f0f0f0;
  margin-top: 2px;
}
</style>

</head>
<body>

<!-- 时钟组件 - 文字叠加在图标上 -->
<div class="clock-container">
  <div class="clock-bg" id="clockBg"></div>
  <div class="clock-text-overlay">
    <div class="weekday-display" id="weekdayDisplay">星期二</div>
    <div class="date-display" id="dateDisplay">02日</div>
    <div class="period-display" id="periodDisplay">上午</div>
    <div class="time-display" id="timeDisplay">08:33</div>
    <div class="percentage-display" id="percentageDisplay">25%</div>
  </div>
</div>

<script>
// ===== 时钟更新函数 =====
function updateClock() {
  const now = new Date();
  const hours = now.getHours();
  const minutes = now.getMinutes();
  
  // 星期
  const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
  const weekday = weekdays[now.getDay()];
  
  // 日期
  const day = now.getDate();
  const dateStr = (day < 10 ? '0' + day : day) + '日';
  
  // 时段判断
  const period = hours < 12 ? '上午' : '下午';
  
  // 时间格式
  const timeStr = (hours < 10 ? '0' + hours : hours) + ':' + (minutes < 10 ? '0' + minutes : minutes);
  
  // 随机电量百分比
  const percentage = Math.floor(Math.random() * 30) + 20;
  
  // 更新文字
  document.getElementById('weekdayDisplay').textContent = weekday;
  document.getElementById('dateDisplay').textContent = dateStr;
  document.getElementById('periodDisplay').textContent = period;
  document.getElementById('timeDisplay').textContent = timeStr;
  document.getElementById('percentageDisplay').textContent = percentage + '%';
  
  // 根据时间切换背景图标
  const clockBg = document.getElementById('clockBg');
  if (hours >= 7 && hours < 15) {
    clockBg.style.backgroundImage = "url('https://i.ibb.co/sJCmM13V/IMG-4775.png')";
  } else if (hours >= 15 && hours < 19) {
    clockBg.style.backgroundImage = "url('https://i.ibb.co/xtdH3Mpt/IMG-4773.png')";
  } else {
    clockBg.style.backgroundImage = "url('https://i.ibb.co/bjfKnynR/IMG-4774.png')";
  }
}

// 初始更新
updateClock();

// 每分钟更新
setInterval(updateClock, 60000);

// 每秒更新时间（让时间实时变化）
setInterval(() => {
  const now = new Date();
  const hours = now.getHours();
  const minutes = now.getMinutes();
  const timeStr = (hours < 10 ? '0' + hours : hours) + ':' + (minutes < 10 ? '0' + minutes : minutes);
  document.getElementById('timeDisplay').textContent = timeStr;
  
  // 实时更新时段
  const period = hours < 12 ? '上午' : '下午';
  document.getElementById('periodDisplay').textContent = period;
}, 1000);

// ===== 原有代码保持 =====
function getTimeType() {
  const hour = new Date().getHours()
  if (hour >= 7 && hour < 15) {
    return "day"
  } else if (hour >= 15 && hour < 19) {
    return "evening"
  } else {
    return "night"
  }
}

const UI_MAP = {
  day: [
    "https://i.ibb.co/2GyGQtz/IMG-4785.jpg",
    "https://i.ibb.co/TxkckTRt/IMG-4786.jpg",
    "https://i.ibb.co/xtv6DBbr/IMG-4787.jpg"
  ],
  evening: [
    "https://i.ibb.co/YBfn3byB/IMG-4788.jpg"
  ],
  night: [
    "https://i.ibb.co/v6KSLczf/IMG-4789.jpg",
    "https://i.ibb.co/fzPDWPVV/IMG-4790.jpg",
    "https://i.ibb.co/1Yx4Z9YX/IMG-4791.jpg"
  ]
}

function getRandomUI() {
  const type = getTimeType()
  const list = UI_MAP[type]
  const index = Math.floor(Math.random() * list.length)
  return list[index]
}

function setBackground() {
  const bg = getRandomUI()
  document.body.style.backgroundImage = `url(${bg})`
}

setBackground()
setInterval(() => {
  setBackground()
}, 10 * 60 * 1000)
  
let mood = 70
let energy = 60
let hunger = 50
let sleepiness = 30

function updateStatusByTime() {
  const hour = new Date().getHours()
  if (hour >= 7 && hour <= 9) {
    mood -= 10
    sleepiness += 20
  }
  if (hour >= 22) {
    sleepiness += 15
  }
  if ((hour >= 11 && hour <= 13) || (hour >= 18 && hour <= 19)) {
    hunger += 20
  }
  mood = Math.max(-30, Math.min(100, mood))
  energy = Math.max(0, Math.min(100, energy))
  hunger = Math.max(0, Math.min(100, hunger))
  sleepiness = Math.max(0, Math.min(100, sleepiness))
}

updateStatusByTime()

document.body.addEventListener("click", () => {
  const action = Math.floor(Math.random() * 3)
  if (action === 0) {
    hunger -= 20
    mood += 5
  } else if (action === 1) {
    sleepiness -= 30
    energy += 20
  } else {
    mood += 10
    energy -= 5
  }
  updateStatusByTime()
  showStatus()
})

function showStatus() {
  let box = document.getElementById("statusBox")
  if (!box) {
    box = document.createElement("div")
    box.id = "statusBox"
    box.style.position = "fixed"
    box.style.top = "20px"
    box.style.left = "20px"
    box.style.padding = "10px 15px"
    box.style.background = "rgba(0,0,0,0.5)"
    box.style.color = "#fff"
    box.style.borderRadius = "10px"
    box.style.fontSize = "14px"
    document.body.appendChild(box)
  }
  box.innerHTML = `
  心情：${mood}<br>
  精力：${energy}<br>
  饥饿：${hunger}<br>
  困意：${sleepiness}
  `
}

showStatus()

function showMoodIcon() {
  const icon = document.createElement("div")
  icon.style.position = "fixed"
  icon.style.top = "120px"
  icon.style.left = "50%"
  icon.style.transform = "translateX(-50%)"
  icon.style.fontSize = "30px"
  icon.style.transition = "0.5s"
  if (mood > 80) {
    icon.innerText = "❤️"
  } else if (mood > 50) {
    icon.innerText = "😊"
  } else if (mood > 20) {
    icon.innerText = "😐"
  } else {
    icon.innerText = "💧"
  }
  document.body.appendChild(icon)
  setTimeout(() => {
    icon.remove()
  }, 1500)
}

let moodIcon = document.createElement('img');
moodIcon.style.position = 'absolute';
moodIcon.style.zIndex = '9999';
document.body.appendChild(moodIcon);

function updateMoodIcon() {
  const character = document.querySelector('.character');
  const characterRect = character.getBoundingClientRect();
  moodIcon.style.left = `${characterRect.left + characterRect.width / 2 - moodIcon.width / 2}px`;
  moodIcon.style.top = `${characterRect.top - moodIcon.height - 10}px`;
}

function updateMoodIconBasedOnStatus() {
  if (mood > 70) {
    moodIcon.src = "https://example.com/heart-icon.png";
  } else if (mood > 40) {
    moodIcon.src = "https://example.com/smile-icon.png";
  } else {
    moodIcon.src = "https://example.com/sad-icon.png";
  }
}

function update() {
  updateMoodIconBasedOnStatus();
  updateMoodIcon();
}

setInterval(update, 30 * 60 * 1000);
</script>

</body>
</html>
