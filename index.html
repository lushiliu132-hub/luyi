<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>璐小家</title>

<style>
body{
  margin:0;
  height:100vh;
  position: relative;

  background-size: 100% auto;
  background-repeat: no-repeat;
  background-position: center top;
  background-color: #000;

  transition:background-image 0.5s ease;
}

/* ✨ 底纹层 */
body::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: url('https://i.ibb.co/PzPCwYPM/IMG-4755.png');
  background-repeat: repeat;
  background-size: auto;
  opacity: 0.15;
  z-index: -1;
  pointer-events: none;
}

/* 时钟组件容器 */
#clockWidget {
  position: fixed;
  top: 8px;
  right: 18px;
  z-index: 1000;
  width: 170px;
  height: auto;
}

#clockWidget img {
  width: 100%;
  height: auto;
  display: block;
}

/* 时间文字覆盖层 */
.clock-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.date-text {
  position: absolute;
  top: 10%;
  left: 45%;
  font-family: "Microsoft YaHei", "SimHei", sans-serif;
  font-size: 11px;
  font-weight: bold;
  color: #3a2415;
  text-align: left;
  letter-spacing: 0.5px;
}

.time-text {
  position: absolute;
  top: 50%;
  left: 45%;
  font-family: "Arial", "Microsoft YaHei", sans-serif;
  font-size: 14px;
  font-weight: bold;
  color: #3a2415;
  letter-spacing: 1px;
}

/* 交互按钮 */
.interactive-btn {
  position: fixed;
  border: none;
  cursor: pointer;
  z-index: 100;
  padding: 0;
  background: transparent;
  transition: transform 0.2s, opacity 0.2s;
}

.interactive-btn img {
  width: 100%;
  height: 100%;
  display: block;
}

.interactive-btn:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

.interactive-btn:active {
  transform: scale(0.95);
  opacity: 0.8;
}

/* 外出按钮 */
#btnGoOut {
  top: 12px;
  left: 55px;
  width: 82px;
  height: 34px;
}

/* 家庭成员按钮 */
#btnFamily {
  top: 12px;
  left: 128px;
  width: 115px;
  height: 34px;
}

/* 主页按钮 */
#btnHome {
  top: 12px;
  right: 210px;
  width: 82px;
  height: 34px;
}

/* Kitty手机按钮 */
#btnKitty {
  top: 140px;
  right: 50px;
  width: 78px;
  height: 95px;
}

@media (max-width: 600px) {
  #clockWidget {
    width: 130px;
    top: 6px;
    right: 6px;
  }
  
  .date-text {
    font-size: 9px;
  }
  
  .time-text {
    font-size: 11px;
  }
  
  #btnGoOut {
    top: 14px;
    left: 10px;
    width: 68px;
    height: 28px;
  }

  #btnFamily {
    top: 14px;
    left: 82px;
    width: 92px;
    height: 28px;
  }

  #btnHome {
    top: 14px;
    right: 140px;
    width: 68px;
    height: 28px;
  }

  #btnKitty {
    top: 115px;
    right: 10px;
    width: 55px;
    height: 70px;
  }
}

/* ===== 互动面板 ===== */
.interactive-panel {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 2000;
  display: none;
  justify-content: center;
  align-items: center;
}
.interactive-panel.active {
  display: flex;
}

/* 面板内容包裹层：让图片保持原始比例居中 */
.panel-content {
  position: relative;
  display: inline-block;
  max-width: 90vw;
  max-height: 85vh;
}

.panel-bg {
  display: block;
  max-width: 90vw;
  max-height: 85vh;
  width: auto;
  height: auto;
  object-fit: contain;
}

/* 透明关闭热区：盖在面板背景图自带的红色叉上 */
.panel-close {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 42px;
  height: 42px;
  border: none;
  background: transparent;
  cursor: pointer;
  z-index: 2001;
  padding: 0;
  transition: transform 0.2s;
}
.panel-close:hover {
  transform: scale(1.1);
}
.panel-close:active {
  transform: scale(0.92);
}

/* 小手机面板内的返回按钮 */
.kitty-return-btn {
  position: absolute;
  bottom: 30px;
  right: 30px;
  width: 75px;
  height: 95px;
  border: none;
  background: transparent;
  cursor: pointer;
  z-index: 2001;
  padding: 0;
  transition: transform 0.2s;
}
.kitty-return-btn img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: contain;
}
.kitty-return-btn:hover {
  transform: scale(1.05);
  opacity: 0.9;
}
.kitty-return-btn:active {
  transform: scale(0.95);
}
/* ===== 小手机面板专用尺寸 & 位置 ===== */
#panelKitty {
  align-items: flex-start;
  padding-top: 10vh;           /* 上移：从18vh减到10vh */
  justify-content: center;     /* 水平基准居中 */
}

#panelKitty .panel-content {
  max-width: 30vw;
  max-height: 48vh;
  margin-left: -25px;          /* 左移：整体往左偏25px */
}

#panelKitty .panel-bg {
  max-width: 30vw;
  max-height: 48vh;
}

#panelKitty .kitty-return-btn {
  bottom: 14px;
  right: 14px;
  width: 48px;
  height: 60px;
}

</style>

</head>
<body>

<!-- 时钟组件 -->
<div id="clockWidget">
  <img src="" alt="时钟" id="clockIcon">
  <div class="clock-overlay">
    <div class="date-text" id="dateText">星期一 02日</div>
    <div class="time-text" id="timeText">上午 08:33</div>
  </div>
</div>

<!-- 交互按钮 -->
<button class="interactive-btn" id="btnGoOut" title="外出">
  <img src="https://i.ibb.co/ksckdZsy/IMG-4777.jpg" alt="外出">
</button>

<button class="interactive-btn" id="btnFamily" title="家庭成员">
  <img src="https://i.ibb.co/FbNs95S9/IMG-4778.jpg" alt="家庭成员">
</button>

<button class="interactive-btn" id="btnHome" title="主页">
  <img src="https://i.ibb.co/V0JkwTmM/IMG-4779.jpg" alt="主页">
</button>

<button class="interactive-btn" id="btnKitty" title="Kitty手机">
  <img src="https://i.ibb.co/XxwWKQDr/IMG-4806.png" alt="Kitty手机">
</button>

<!-- ===== 互动面板层（必须放在script之前） ===== -->
<div id="panelHome" class="interactive-panel">
  <div class="panel-content">
    <img src="https://i.ibb.co/DDw1LnM1/IMG-4433.jpg" class="panel-bg" alt="主页面板">
    <button class="panel-close" data-panel="panelHome" title="返回"></button>
  </div>
</div>

<div id="panelFamily" class="interactive-panel">
  <div class="panel-content">
    <img src="https://i.ibb.co/84nnyXXy/IMG-4817.png" class="panel-bg" alt="家庭成员面板">
    <button class="panel-close" data-panel="panelFamily" title="返回"></button>
  </div>
</div>

<div id="panelGoOut" class="interactive-panel">
  <div class="panel-content">
    <img src="https://i.ibb.co/BKr43mRd/IMG-4818.png" class="panel-bg" alt="外出面板">
    <button class="panel-close" data-panel="panelGoOut" title="返回"></button>
  </div>
</div>

<div id="panelKitty" class="interactive-panel">
  <div class="panel-content">
    <img src="https://i.ibb.co/1tqK3Znb/IMG-4819.png" class="panel-bg" alt="小手机面板" id="kittyPanelBg">
    <button class="panel-close" data-panel="panelKitty" title="返回"></button>
    <button id="kittyReturnBtn" class="kitty-return-btn" title="返回主页">
      <img src="https://i.ibb.co/XxwWKQDr/IMG-4806.png" alt="小手机返回">
    </button>
  </div>
</div>

<script>
// ===== 时钟图标 =====
const CLOCK_ICONS = {
  night: 'https://i.ibb.co/sJCmM13V/IMG-4775.png',
  day: 'https://i.ibb.co/bjfKnynR/IMG-4774.png',
  evening: 'https://i.ibb.co/xtdH3Mpt/IMG-4773.png'
};

// 获取北京时间
function getBeijingTime() {
  const now = new Date();
  const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
  const beijingTime = new Date(utc + (3600000 * 8));
  return beijingTime;
}

function padZero(num) {
  return num.toString().padStart(2, '0');
}

function getWeekDayText(day) {
  const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
  return weekDays[day];
}

function updateClock() {
  const beijingTime = getBeijingTime();
  const hour = beijingTime.getHours();
  const minute = beijingTime.getMinutes();
  const date = beijingTime.getDate();
  const day = beijingTime.getDay();
  
  let sceneType;
  if (hour >= 7 && hour < 15) {
    sceneType = 'day';
  } else if (hour >= 15 && hour < 19) {
    sceneType = 'evening';
  } else {
    sceneType = 'night';
  }
  
  const clockIcon = document.getElementById('clockIcon');
  clockIcon.src = CLOCK_ICONS[sceneType];
  
  const dateText = document.getElementById('dateText');
  dateText.textContent = `${getWeekDayText(day)} ${padZero(date)}日`;
  
  const timeText = document.getElementById('timeText');
  const period = hour < 12 ? '上午' : '下午';
  const displayHour = hour % 12 || 12;
  timeText.textContent = `${period} ${padZero(displayHour)}:${padZero(minute)}`;
}

updateClock();
setInterval(updateClock, 1000);

Object.values(CLOCK_ICONS).forEach(url => {
  const img = new Image();
  img.src = url;
});

function getTimeType() {
  const hour = new Date().getHours()
  if (hour >= 7 && hour < 15) {
    return "day"
  } else if (hour >= 15 && hour < 19) {
    return "evening"
  } else {
    return "night"
  }
}

const UI_MAP = {
  day: [
    "https://i.ibb.co/2GyGQtz/IMG-4785.jpg",
    "https://i.ibb.co/TxkckTRt/IMG-4786.jpg",
    "https://i.ibb.co/xtv6DBbr/IMG-4787.jpg"
  ],
  evening: [
    "https://i.ibb.co/YBfn3byB/IMG-4788.jpg"
  ],
  night: [
    "https://i.ibb.co/v6KSLczf/IMG-4789.jpg",
    "https://i.ibb.co/fzPDWPVV/IMG-4790.jpg",
    "https://i.ibb.co/1Yx4Z9YX/IMG-4791.jpg"
  ]
}

function getRandomUI() {
  const type = getTimeType()
  const list = UI_MAP[type]
  const index = Math.floor(Math.random() * list.length)
  return list[index]
}

function setBackground() {
  const bg = getRandomUI()
  document.body.style.backgroundImage = `url(${bg})`
}

setBackground()

function updateStatusByTime() {
  const hour = new Date().getHours()
  if (hour >= 7 && hour <= 9) {
    mood -= 10
    sleepiness += 20
  }
  if (hour >= 22) {
    sleepiness += 15
  }
  if ((hour >= 11 && hour <= 13) || (hour >= 18 && hour <= 19)) {
    hunger += 20
  }
  mood = Math.max(-30, Math.min(100, mood))
  energy = Math.max(0, Math.min(100, energy))
  hunger = Math.max(0, Math.min(100, hunger))
  sleepiness = Math.max(0, Math.min(100, sleepiness))
}

let mood = 70
let energy = 60
let hunger = 50
let sleepiness = 30

updateStatusByTime()

document.body.addEventListener("click", () => {
  const action = Math.floor(Math.random() * 3)
  if (action === 0) {
    hunger -= 20
    mood += 5
  } else if (action === 1) {
    sleepiness -= 30
    energy += 20
  } else {
    mood += 10
    energy -= 5
  }
  updateStatusByTime()
  showStatus()
})

function showStatus() {
  let box = document.getElementById("statusBox")
  if (!box) {
    box = document.createElement("div")
    box.id = "statusBox"
    box.style.position = "fixed"
    box.style.top = "20px"
    box.style.left = "20px"
    box.style.padding = "10px 15px"
    box.style.background = "rgba(0,0,0,0.5)"
    box.style.color = "#fff"
    box.style.borderRadius = "10px"
    box.style.fontSize = "14px"
    document.body.appendChild(box)
  }
  box.innerHTML = `
  心情:${mood}<br>
  精力:${energy}<br>
  饥饿:${hunger}<br>
  困意:${sleepiness}
  `
}

showStatus()

function showMoodIcon() {
  const icon = document.createElement("div")
  icon.style.position = "fixed"
  icon.style.top = "120px"
  icon.style.left = "50%"
  icon.style.transform = "translateX(-50%)"
  icon.style.fontSize = "30px"
  icon.style.transition = "0.5s"
  if (mood > 80) {
    icon.innerText = "❤️"
  } else if (mood > 50) {
    icon.innerText = "😊"
  } else if (mood > 20) {
    icon.innerText = "😐"
  } else {
    icon.innerText = "💧"
  }
  document.body.appendChild(icon)
  setTimeout(() => {
    icon.remove()
  }, 1500)
}

let moodIcon = document.createElement('img');
moodIcon.style.position = 'absolute';
moodIcon.style.zIndex = '9999';
document.body.appendChild(moodIcon);

function updateMoodIcon() {
  const character = document.querySelector('.character');
  if (!character) return;
  const characterRect = character.getBoundingClientRect();
  moodIcon.style.left = `${characterRect.left + characterRect.width / 2 - moodIcon.width / 2}px`;
  moodIcon.style.top = `${characterRect.top - moodIcon.height - 10}px`;
}

function updateMoodIconBasedOnStatus() {
  if (mood > 70) {
    moodIcon.src = "https://example.com/heart-icon.png";
  } else if (mood > 40) {
    moodIcon.src = "https://example.com/smile-icon.png";
  } else {
    moodIcon.src = "https://example.com/sad-icon.png";
  }
}

function update() {
  updateMoodIconBasedOnStatus();
  updateMoodIcon();
}

setInterval(update, 30 * 60 * 1000);

// ===== 面板开关控制 =====
function openPanel(panelId) {
  document.querySelectorAll('.interactive-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById(panelId);
  if (panel) panel.classList.add('active');
}

function closePanel(panelId) {
  const panel = document.getElementById(panelId);
  if (panel) panel.classList.remove('active');
}

function closeAllPanels() {
  document.querySelectorAll('.interactive-panel').forEach(p => p.classList.remove('active'));
}

// ===== 直接绑定事件（脚本已在body底部，DOM已就绪） =====
document.getElementById('btnHome').addEventListener('click', (e) => {
  e.stopPropagation();
  openPanel('panelHome');
});

document.getElementById('btnGoOut').addEventListener('click', (e) => {
  e.stopPropagation();
  openPanel('panelGoOut');
});

document.getElementById('btnFamily').addEventListener('click', (e) => {
  e.stopPropagation();
  openPanel('panelFamily');
});

document.getElementById('btnKitty').addEventListener('click', (e) => {
  e.stopPropagation();
  const kittyPanel = document.getElementById('panelKitty');
  if (kittyPanel.classList.contains('active')) {
    closeAllPanels();
  } else {
    openPanel('panelKitty');
  }
});

document.querySelectorAll('.panel-close').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const panelId = btn.getAttribute('data-panel');
    closePanel(panelId);
  });
});

const kittyReturnBtn = document.getElementById('kittyReturnBtn');
if (kittyReturnBtn) {
  kittyReturnBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    closeAllPanels();
  });
}

// 预加载按钮图片
const buttonImages = [
  'https://i.ibb.co/V0JkwTmM/IMG-4779.jpg',
  'https://i.ibb.co/ksckdZsy/IMG-4777.jpg',
  'https://i.ibb.co/FbNs95S9/IMG-4778.jpg',
  'https://i.ibb.co/XxwWKQDr/IMG-4806.png'
];

buttonImages.forEach(url => {
  const img = new Image();
  img.src = url;
});

</script>

</body>
</html>
