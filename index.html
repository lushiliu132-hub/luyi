<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>璐小家</title>
    <style>
        body{
          margin:0;
          height:100vh;
          position: relative;
          background-size: 100% auto;
          background-repeat: no-repeat;
          background-position: center top;
          background-color: #000;
          transition:background-image 0.5s ease;
        }

        /* ✨ 底纹层 */
        body::before {
          content: '';
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background-image: url('https://i.ibb.co/PzPCwYPM/IMG-4755.png');
          background-repeat: repeat;
          background-size: auto;
          opacity: 0.15;
          z-index: -1;
          pointer-events: none;
        }

        /* 时钟组件容器 */
        #clockWidget {
          position: fixed;
          top: 8px;
          right: 18px;
          z-index: 1000;
          width: 170px;
          height: auto;
        }

        #clockWidget img {
          width: 100%;
          height: auto;
          display: block;
        }

        /* 时间文字覆盖层 */
        .clock-overlay {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          pointer-events: none;
        }

        .date-text {
          position: absolute;
          top: 10%;
          left: 45%;
          font-family: "Microsoft YaHei", "SimHei", sans-serif;
          font-size: 11px;
          font-weight: bold;
          color: #3a2415;
          text-align: left;
          letter-spacing: 0.5px;
        }

        .time-text {
          position: absolute;
          top: 50%;
          left: 45%;
          font-family: "Arial", "Microsoft YaHei", sans-serif;
          font-size: 14px;
          font-weight: bold;
          color: #3a2415;
          letter-spacing: 1px;
        }

        /* 交互按钮 */
        .interactive-btn {
          position: fixed;
          border: none;
          cursor: pointer;
          z-index: 100;
          padding: 0;
          background: transparent;
          transition: transform 0.2s, opacity 0.2s;
        }

        .interactive-btn img {
          width: 100%;
          height: 100%;
          display: block;
        }

        .interactive-btn:hover {
          transform: scale(1.05);
          opacity: 0.9;
        }

        .interactive-btn:active {
          transform: scale(0.95);
          opacity: 0.8;
        }

        /* 外出按钮 */
        #btnGoOut {
          top: 12px;
          left: 55px;
          width: 82px;
          height: 34px;
        }

        /* 家庭成员按钮 */
        #btnFamily {
          top: 12px;
          left: 128px;
          width: 115px;
          height: 34px;
        }

        /* 主页按钮 */
        #btnHome {
          top: 12px;
          right: 210px;
          width: 82px;
          height: 34px;
        }

        /* Kitty手机按钮 */
        #btnKitty {
          top: 140px;
          right: 50px;
          width: 78px;
          height: 95px;
        }

        @media (max-width: 600px) {
          #clockWidget {
            width: 130px;
            top: 6px;
            right: 6px;
          }

          .date-text {
            font-size: 9px;
          }

          .time-text {
            font-size: 11px;
          }

          #btnGoOut {
            top: 14px;
            left: 10px;
            width: 68px;
            height: 28px;
          }

          #btnFamily {
            top: 14px;
            left: 82px;
            width: 92px;
            height: 28px;
          }

          #btnHome {
            top: 14px;
            right: 140px;
            width: 68px;
            height: 28px;
          }

          #btnKitty {
            top: 115px;
            right: 10px;
            width: 55px;
            height: 70px;
          }
        }

        /* ===== 互动面板 ===== */
        .interactive-panel {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          z-index: 2000;
          display: none;
          justify-content: center;
          align-items: center;
        }

        .interactive-panel.active {
          display: flex;
        }

        .panel-content {
          position: relative;
          display: inline-block;
          max-width: 90vw;
          max-height: 85vh;
        }

        .panel-bg {
          display: block;
          max-width: 90vw;
          max-height: 85vh;
          width: auto;
          height: auto;
          object-fit: contain;
        }

        .panel-close {
          position: absolute;
          top: 10px;
          left: 10px;
          width: 42px;
          height: 42px;
          border: none;
          background: transparent;
          cursor: pointer;
          z-index: 2001;
          padding: 0;
          transition: transform 0.2s;
        }

        .panel-close:hover {
          transform: scale(1.1);
        }

        .panel-close:active {
          transform: scale(0.92);
        }

        /* ===== 小手机交互系统 ===== */
        #panelKitty {
          align-items: center;
          justify-content: center;
          padding: 2vh 0;
        }

        #panelKitty .panel-content {
          width: min(320px, 85vw);
          aspect-ratio: 9 / 18;
          max-height: 78vh;
          position: relative;
        }

        /* 手机边框 */
        .phone-frame {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          object-fit: contain;
          pointer-events: none;
          z-index: 100;
        }

        /* 手机屏幕内容区 */
        .phone-screen {
          position: absolute;
          top: 6%;
          left: 7%;
          width: 86%;
          height: 88%;
          overflow: hidden;
          background: #fff;
          border-radius: 10px;
        }

        /* 小手机关闭按钮 */
        .phone-close-btn {
          position: absolute;
          top: 1.5%;
          right: 3%;
          width: 28px;
          height: 28px;
          background: rgba(255, 255, 255, 0.9);
          border: none;
          border-radius: 50%;
          cursor: pointer;
          z-index: 200;
          font-size: 18px;
          line-height: 1;
          color: #ff6b6b;
          transition: all 0.2s;
        }

        .phone-close-btn:hover {
          background: #fff;
          transform: scale(1.1);
        }

        /* 小手机内的各个界面 */
        .phone-page {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          display: none;
        }

        .phone-page.active {
          display: block;
        }

        .cart-badge {
          position: absolute;
          top: 68%;
          right: 15%;
          background: #ff6b6b;
          color: white;
          border-radius: 50%;
          width: 20px;
          height: 20px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 11px;
          font-weight: bold;
        }

        /* 结算页面特殊样式 */
        .checkout-content {
          position: absolute;
          top: 14%;
          left: 10%;
          width: 80%;
          height: 68%;
          overflow-y: auto;
        }

    </style>
</head>
<body>

<!-- 时钟组件 -->
<div id="clockWidget">
  <img src="" alt="时钟" id="clockIcon">
  <div class="clock-overlay">
    <div class="date-text" id="dateText">星期一 02日</div>
    <div class="time-text" id="timeText">上午 08:33</div>
  </div>
</div>

<!-- 交互按钮 -->
<button class="interactive-btn" id="btnGoOut" title="外出">
  <img src="https://i.ibb.co/ksckdZsy/IMG-4777.jpg" alt="外出">
</button>

<button class="interactive-btn" id="btnFamily" title="家庭成员">
  <img src="https://i.ibb.co/FbNs95S9/IMG-4778.jpg" alt="家庭成员">
</button>

<button class="interactive-btn" id="btnHome" title="主页">
  <img src="https://i.ibb.co/V0JkwTmM/IMG-4779.jpg" alt="主页">
</button>

<button class="interactive-btn" id="btnKitty" title="Kitty手机">
  <img src="https://i.ibb.co/XxwWKQDr/IMG-4806.png" alt="Kitty手机">
</button>

<!-- ===== 互动面板层 ===== -->
<div id="panelHome" class="interactive-panel">
  <div class="panel-content">
    <img src="https://i.ibb.co/4wm5rnzr/IMG-4830.jpg" class="panel-bg" alt="主页面板">
    <button class="panel-close" data-panel="panelHome" title="返回"></button>
  </div>
</div>

<!-- ===== 小手机面板 ===== -->
<div id="panelKitty" class="interactive-panel">
  <div class="panel-content">
    <img src="https://i.ibb.co/ZRHKWhkm/IMG-4848.png" class="phone-frame" alt="手机边框">
    <button class="phone-close-btn" id="phoneCloseBtn">×</button>
    <div class="phone-screen">
      <div class="phone-page active" id="pageShopList">
        <!-- 店铺列表 -->
      </div>
      <div class="phone-page" id="pageProductList">
        <!-- 商品列表 -->
      </div>
      <div class="phone-page" id="pageCheckout">
        <!-- 结算页面 -->
      </div>
    </div>
  </div>
</div>

<script>
// 时钟与交互面板功能实现
// 你可以根据需要在此处添加时钟、面板切换、购物车等功能实现的代码
</script>

</body>
</html>
