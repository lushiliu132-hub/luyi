<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>璐小家</title>

<style>
body{
  margin:0;
  height:100vh;
  position: relative;
  background-size: 100% auto;
  background-repeat: no-repeat;
  background-position: center top;
  background-color: #000;
  transition:background-image 0.5s ease;
}

/* 底纹层 */
body::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: url('https://i.ibb.co/PzPCwYPM/IMG-4755.png');
  background-repeat: repeat;
  background-size: auto;
  opacity: 0.15;
  z-index: -1;
  pointer-events: none;
}

/* 时钟组件容器 */
#clockWidget {
  position: fixed;
  top: 8px;
  right: 18px;
  z-index: 1000;
  width: 170px;
  height: auto;
}
#clockWidget img {
  width: 100%;
  height: auto;
  display: block;
}

/* 时间文字覆盖层 */
.clock-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
.date-text {
  position: absolute;
  top: 10%;
  left: 45%;
  font-family: "Microsoft YaHei", "SimHei", sans-serif;
  font-size: 11px;
  font-weight: bold;
  color: #3a2415;
  text-align: left;
  letter-spacing: 0.5px;
}
.time-text {
  position: absolute;
  top: 50%;
  left: 45%;
  font-family: "Arial", "Microsoft YaHei", sans-serif;
  font-size: 14px;
  font-weight: bold;
  color: #3a2415;
  letter-spacing: 1px;
}

/* 交互按钮 */
.interactive-btn {
  position: fixed;
  border: none;
  cursor: pointer;
  z-index: 100;
  padding: 0;
  background: transparent;
  transition: transform 0.2s, opacity 0.2s;
}
.interactive-btn img {
  width: 100%;
  height: 100%;
  display: block;
}
.interactive-btn:hover {
  transform: scale(1.05);
  opacity: 0.9;
}
.interactive-btn:active {
  transform: scale(0.95);
  opacity: 0.8;
}
#btnGoOut { top: 12px; left: 55px; width: 82px; height: 34px; }
#btnFamily { top: 12px; left: 128px; width: 115px; height: 34px; }
#btnHome { top: 12px; right: 210px; width: 82px; height: 34px; }
#btnKitty { top: 140px; right: 50px; width: 78px; height: 95px; }

@media (max-width: 600px) {
  #clockWidget { width: 130px; top: 6px; right: 6px; }
  .date-text { font-size: 9px; }
  .time-text { font-size: 11px; }
  #btnGoOut { top: 14px; left: 10px; width: 68px; height: 28px; }
  #btnFamily { top: 14px; left: 82px; width: 92px; height: 28px; }
  #btnHome { top: 14px; right: 140px; width: 68px; height: 28px; }
  #btnKitty { top: 115px; right: 10px; width: 55px; height: 70px; }
}

/* ===== 互动面板 ===== */
.interactive-panel {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 2000;
  display: none;
  justify-content: center;
  align-items: center;
  background-color: rgba(0, 0, 0, 0.5); /* 背景透明 */
}

.interactive-panel.active {
  display: flex;
}

.panel-content {
  position: relative;
  display: inline-block;
  max-width: 90vw;
  max-height: 85vh;
  background-color: white; /* 增加背景色 */
  padding: 16px;
  border-radius: 10px;
}

/* 关闭按钮 */
.panel-close {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 42px;
  height: 42px;
  border: none;
  background: transparent;
  cursor: pointer;
  z-index: 2001;
  padding: 0;
  transition: transform 0.2s;
}
.panel-close:hover { transform: scale(1.1); }
.panel-close:active { transform: scale(0.92); }

/* 外卖界面样式 */
.takeout-bg {
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  position: relative;
  background-image: url('https://i.ibb.co/6JpG9rHd/IMG-4889.jpg'); /* 替换为新图片 */
}

/* 外卖返回按钮（返回桌面） */
.takeout-back {
  position: absolute;
  top: 1.5%;
  right: 3%;
  width: 28px;
  height: 28px;
  background: rgba(255,107,107,0.9);
  border: 2px solid #fff;
  border-radius: 50%;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  transition: transform 0.2s;
}
.takeout-back:hover {
  transform: scale(1.1);
}

/* 分类标签 */
.category-tabs {
  position: absolute;
  top: 9%;
  left: 5%;
  width: 90%;
  height: 8%;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 4px;
  z-index: 20;
}

.tab-btn {
  flex: 1;
  height: 85%;
  background: rgba(255,255,255,0.6);
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: bold;
  color: #666;
  cursor: pointer;
  transition: all 0.2s;
  padding: 0;
}
.tab-btn.active {
  background: #ff8c42;
  color: #fff;
  box-shadow: 0 2px 6px rgba(255,140,66,0.4);
}
.tab-btn:hover {
  transform: translateY(-1px);
}

/* 店铺列表 */
.shop-list {
  position: absolute;
  top: 19%;
  left: 6%;
  width: 88%;
  height: 62%;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 20;
  padding-right: 2px;
}

.shop-item {
  display: flex;
  align-items: center;
  gap: 10px;
  height: 15%;
  min-height: 50px;
  background: rgba(255,255,255,0.85);
  border: none;
  border-radius: 10px;
  padding: 6px 12px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  text-align: left;
  flex-shrink: 0;
}
.shop-item:hover {
  transform: scale(1.02);
  box-shadow: 0 3px 10px rgba(0,0,0,0.12);
}
.shop-item:active {
  transform: scale(0.98);
}

.shop-item img {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  object-fit: cover;
  flex-shrink: 0;
}

.shop-info {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.shop-name {
  font-size: 13px;
  font-weight: bold;
  color: #333;
}

.shop-meta {
  font-size: 10px;
  color: #999;
}

.shop-price {
  font-size: 12px;
  color: #ff6b6b;
  font-weight: bold;
  flex-shrink: 0;
}
</style>
</head>
<body>

<!-- 时钟组件 -->
<div id="clockWidget">
  <img src="" alt="时钟" id="clockIcon">
  <div class="clock-overlay">
    <div class="date-text" id="dateText">星期一 02日</div>
    <div class="time-text" id="timeText">上午 08:33</div>
  </div>
</div>

<!-- 交互按钮 -->
<button class="interactive-btn" id="btnGoOut" title="外出">
  <img src="https://i.ibb.co/ksckdZsy/IMG-4777.jpg" alt="外出">
</button>
<button class="interactive-btn" id="btnFamily" title="家庭成员">
  <img src="https://i.ibb.co/FbNs95S9/IMG-4778.jpg" alt="家庭成员">
</button>
<button class="interactive-btn" id="btnHome" title="主页">
  <img src="https://i.ibb.co/V0JkwTmM/IMG-4779.jpg" alt="主页">
</button>
<button class="interactive-btn" id="btnKitty" title="Kitty手机">
  <img src="https://i.ibb.co/XxwWKQDr/IMG-4806.png" alt="Kitty手机">
</button>

<!-- 互动面板层 -->
<div id="panelHome" class="interactive-panel">
  <div class="panel-content">
    <img src="https://i.ibb.co/4wm5rnzr/IMG-4830.jpg" class="panel-bg" alt="主页面板">
    <button class="panel-close" data-panel="panelHome" title="返回"></button>
    <div class="home-stats-overlay">
      <div class="home-left-col">
        <div>姓名：璐</div>
        <div>年龄：19</div>
        <div>身高：165</div>
        <div>体重：52kg</div>
        <div>生日：12月12日</div>
      </div>
      <div class="home-right-col">
        <div>心情：<span id="statMood">70</span>/100</div>
        <div>疲惫值：<span id="statEnergy">60</span>/100</div>
        <div>困意：<span id="statSleepiness">30</span>/100</div>
        <div>饥饿值：<span id="statHunger">50</span>/100</div>
      </div>
    </div>
  </div>
</div>

<script>
// 打开外卖界面
document.getElementById('btnKitty').addEventListener('click', () => {
  openPanel('panelHome');  // 打开主面板或其他面板
});
</script>

</body>
</html>
