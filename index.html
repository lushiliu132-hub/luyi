<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>璐的小家</title>

<style>
body{
  margin:0;
  height:100vh;
  position: relative;

  background-size: 100% auto;
  background-repeat: no-repeat;
  background-position: center top;
  background-color: #000;

  transition:background-image 0.5s ease;
}

/* ✨ 修正：改用 ::after 并放到最底层 */
body::after {
  content: '';
  position: fixed; /* 改用 fixed 避免滚动问题 */
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: url('https://i.ibb.co/PzPCwYPM/IMG-4755.png');
  background-repeat: repeat;
  background-size: 200px; /* 调整图案大小 */
  opacity: 0.3; /* 你可以调整这个值 0.1-0.5 */
  z-index: -999; /* 确保在所有内容下方 */
  pointer-events: none;
}
</style>

</head>
<body>

<script>
// ===== 时间判断 =====
function getTimeType() {
  const hour = new Date().getHours()

  if (hour >= 7 && hour < 15) {
    return "day"
  } else if (hour >= 15 && hour < 19) {
    return "evening"
  } else {
    return "night"
  }
}

// ===== UI图片 =====
const UI_MAP = {
  day: [
    "https://i.ibb.co/RTRM2Y5Z/IMG-4364.jpg",
    "https://i.ibb.co/qLDQjN9f/IMG-4370.jpg",
    "https://i.ibb.co/v6PDRSSg/IMG-4376.jpg"
  ],
  evening: [
    "https://i.ibb.co/p6cXrycC/IMG-4372.jpg"
  ],
  night: [
    "https://i.ibb.co/35m6d0j8/IMG-4374.jpg",
    "https://i.ibb.co/p6yjz7jy/IMG-4373.jpg",
    "https://i.ibb.co/YTkBwMfs/IMG-4377.jpg"
  ]
}

// ===== 随机选图 =====
function getRandomUI() {
  const type = getTimeType()
  const list = UI_MAP[type]
  const index = Math.floor(Math.random() * list.length)
  return list[index]
}

// ===== 设置背景 =====
function setBackground() {
  const bg = getRandomUI()
  document.body.style.backgroundImage = `url(${bg})`
}

// ===== 初始加载 =====
setBackground()

// ===== 每10分钟刷新 =====
setInterval(() => {
  setBackground()
}, 10 * 60 * 1000)

</script>

</body>
</html>
