<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kimi生活模拟</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#f5f5f5;
}

.header{
background:white;
padding:15px;
font-size:18px;
font-weight:bold;
border-bottom:1px solid #ddd;
}

.card{
background:white;
margin:12px;
padding:15px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.btn{
margin-top:10px;
padding:10px;
background:#4CAF50;
color:white;
text-align:center;
border-radius:8px;
}

.popup{
position:fixed;
bottom:0;
width:100%;
background:white;
padding:20px;
border-top-left-radius:15px;
border-top-right-radius:15px;
display:none;
}
</style>
</head>

<body>

<div class="header">Kimi生活模拟</div>

<div class="card">
心情: <span id="mood">50</span><br>
疲惫: <span id="tired">50</span><br>
困意: <span id="sleepy">50</span><br>
饥饿: <span id="hungry">50</span>
</div>

<div class="card">
<div class="btn" onclick="out()">外出</div>
<div class="btn" onclick="chat()">微信聊天</div>
<div class="btn" onclick="eat()">点外卖</div>
</div>

<div id="popup" class="popup"></div>

<script>
let mood=50,tired=50,sleepy=50,hungry=50;

function update(){
moodTxt.innerText=mood;
tiredTxt.innerText=tired;
sleepyTxt.innerText=sleepy;
hungryTxt.innerText=hungry;
}

function show(text){
popup.innerHTML=text+"<br><div class='btn' onclick='closePop()'>关闭</div>";
popup.style.display="block";
}

function closePop(){popup.style.display="none"}

function out(){show("外出了一下 🚶‍♂️");mood+=5;update();}
function chat(){show("聊了会天 😊");mood+=5;update();}
function eat(){show("吃饱了 🍔");hungry-=20;update();}

update();
</script>
