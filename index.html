<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>璐小家</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      position: relative;
      background-size: 100% auto;
      background-repeat: no-repeat;
      background-position: center top;
      background-color: #000;
      transition: background-image 0.5s ease;
    }

    .character {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 260px;
      z-index: 10;
      cursor: pointer;
    }

    /* ✨ 新增：底纹层 */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://i.ibb.co/PzPCwYPM/IMG-4755.png');
      background-repeat: repeat; /* 平铺 */
      background-size: auto; /* 保持原始尺寸 */
      opacity: 0.15; /* 调整透明度，避免太抢眼 */
      z-index: -1; /* 在主背景下层 */
      pointer-events: none; /* 不阻挡交互 */
    }
  </style>
</head>
<body>

  <!-- 白天人物 -->
  <img src="https://i.ibb.co/0RKzx2Y4/IMG-4364.jpg" class="character" id="character-day" alt="白天人物" />

  <script>
    let currentActionDay = 'stand';  // 默认人物是站立的状态
    const characterDay = document.getElementById('character-day');

    // 点击人物时切换动作
    characterDay.addEventListener('click', () => {
      if (currentActionDay === 'stand') {
        characterDay.src = 'https://i.ibb.co/p6SL0Rmg/IMG-4370.jpg';  // 吃饭
        currentActionDay = 'eat';
      } else if (currentActionDay === 'eat') {
        characterDay.src = 'https://i.ibb.co/gL8FRBXk/IMG-4376.jpg';  // 睡觉
        currentActionDay = 'sleep';
      } else {
        characterDay.src = 'https://i.ibb.co/0RKzx2Y4/IMG-4364.jpg';  // 站立
        currentActionDay = 'stand';
      }
    });
  </script>

  <!-- 傍晚人物 -->
  <img src="https://i.ibb.co/dsrzk95k/IMG-4372.jpg" class="character" id="character-evening" alt="傍晚人物" />

  <script>
    // 傍晚人物固定状态，不切换
    function setEveningState() {
      const characterEvening = document.getElementById('character-evening');
      characterEvening.src = 'https://i.ibb.co/dsrzk95k/IMG-4372.jpg';  // 傍晚人物图
    }

    // 傍晚状态锁定
    setEveningState();
  </script>

  <!-- 晚上人物 -->
  <img src="https://i.ibb.co/F49f7mGX/IMG-4374.jpg" class="character" id="character-night" alt="晚上的人物" />

  <script>
    let currentActionNight = 'stand';  // 默认人物是站立的状态
    const characterNight = document.getElementById('character-night');

    // 点击人物时切换动作
    characterNight.addEventListener('click', () => {
      if (currentActionNight === 'stand') {
        characterNight.src = 'https://i.ibb.co/p6SL0Rmg/IMG-4370.jpg';  // 吃饭
        currentActionNight = 'eat';
      } else if (currentActionNight === 'eat') {
        characterNight.src = 'https://i.ibb.co/WNF0BBts/IMG-4377.jpg';  // 睡觉
        currentActionNight = 'sleep';
      } else {
        characterNight.src = 'https://i.ibb.co/F49f7mGX/IMG-4374.jpg';  // 站立
        currentActionNight = 'stand';
      }
    });
  </script>

  <script>
    // ===== 心情图标 =====
    let moodIcon = document.createElement('div');
    moodIcon.style.position = 'absolute';
    moodIcon.style.zIndex = '9999';
    moodIcon.style.fontSize = '30px';
    document.body.appendChild(moodIcon);

    let mood = 70;  // 心情

    // 获取人物位置并更新心情图标位置
    function updateMoodIcon() {
      const character = document.querySelector('.character');
      const rect = character.getBoundingClientRect();

      moodIcon.style.left = `${rect.left + rect.width / 2 - moodIcon.offsetWidth / 2}px`;
      moodIcon.style.top = `${rect.top - moodIcon.offsetHeight - 10}px`; // 图标显示在头顶10px的位置
    }

    // 根据心情值设置图标
    function updateMoodIconBasedOnStatus() {
      if (mood > 70) {
        moodIcon.innerText = "❤️";
      } else if (mood > 50) {
        moodIcon.innerText = "😊";
      } else if (mood > 20) {
        moodIcon.innerText = "😐";
      } else {
        moodIcon.innerText = "💧";
      }
    }

    // 定时更新心情图标
    function update() {
      updateMoodIconBasedOnStatus();
      updateMoodIcon();
    }

    setInterval(update, 30 * 60 * 1000);  // 每30分钟更新一次心情图标
  </script>

</body>
</html>
