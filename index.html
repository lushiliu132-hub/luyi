<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>璐小家</title>
  <style>
    body{
      margin:0;
      height:100vh;
      position: relative;
      background-size: 100% auto;
      background-repeat: no-repeat;
      background-position: center top;
      background-color: #000;
      transition: background-image 0.5s ease;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://i.ibb.co/PzPCwYPM/IMG-4755.png');
      background-repeat: repeat;
      background-size: auto;
      opacity: 0.15;
      z-index: -1;
      pointer-events: none;
    }

    /* ========== 时钟交互卡片样式 ========== */
    .clock-widget {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      width: 180px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 16px 14px 14px 14px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.15);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      transition: background 0.4s ease, box-shadow 0.4s;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .clock-row-top {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      width: 100%;
      gap: 8px;
    }

    .time-icon {
      font-size: 26px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
      line-height: 1;
    }

    .digital-clock {
      font-size: 32px;
      font-weight: 300;
      letter-spacing: 1.5px;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 4px 10px rgba(0,0,0,0.6);
      line-height: 1;
    }

    .date-row {
      display: flex;
      justify-content: flex-end;
      align-items: baseline;
      gap: 8px;
      font-size: 16px;
      font-weight: 400;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
      opacity: 0.9;
      width: 100%;
    }

    .weekday-text {
      font-weight: 500;
    }

    /* 主题微调 */
    .clock-widget.theme-night {
      background: rgba(10, 10, 22, 0.7);
      box-shadow: 0 12px 28px rgba(0,0,0,0.7), 0 0 0 1px rgba(180,200,255,0.25);
    }
    .clock-widget.theme-day {
      background: rgba(40, 70, 110, 0.6);
      box-shadow: 0 12px 28px rgba(0,20,50,0.6), 0 0 0 1px rgba(255,240,180,0.5);
    }
    .clock-widget.theme-evening {
      background: rgba(90, 45, 45, 0.7);
      box-shadow: 0 12px 28px rgba(60,20,20,0.7), 0 0 0 1px rgba(255,150,100,0.5);
    }
  </style>
</head>
<body>

  <!-- 时钟交互组件：固定在右上角，显示时间日期与图标 -->
  <div class="clock-widget" id="clockWidget">
    <div class="clock-row-top">
      <span class="time-icon" id="clockIcon">🌙</span>
      <span class="digital-clock" id="liveTime">08:33</span>
    </div>
    <div class="date-row">
      <span id="liveDate">02日</span>
      <span class="weekday-text" id="liveWeekday">星期二</span>
    </div>
  </div>

  <script>
    (function() {
      // ---------- 原有站点逻辑（背景、状态等） ----------
      function getTimeType() {
        const hour = new Date().getHours()
        if (hour >= 7 && hour < 15) return "day"
        else if (hour >= 15 && hour < 19) return "evening"
        else return "night"
      }

      const UI_MAP = {
        day: [
          "https://i.ibb.co/2GyGQtz/IMG-4785.jpg",
          "https://i.ibb.co/TxkckTRt/IMG-4786.jpg",
          "https://i.ibb.co/xtv6DBbr/IMG-4787.jpg"
        ],
        evening: [
          "https://i.ibb.co/YBfn3byB/IMG-4788.jpg"
        ],
        night: [
          "https://i.ibb.co/v6KSLczf/IMG-4789.jpg",
          "https://i.ibb.co/fzPDWPVV/IMG-4790.jpg",
          "https://i.ibb.co/1Yx4Z9YX/IMG-4791.jpg"
        ]
      }

      function getRandomUI() {
        const type = getTimeType()
        const list = UI_MAP[type]
        const index = Math.floor(Math.random() * list.length)
        return list[index]
      }

      function setBackground() {
        const bg = getRandomUI()
        document.body.style.backgroundImage = `url(${bg})`
      }

      setBackground()
      setInterval(() => {
        setBackground()
      }, 10 * 60 * 1000)

      let mood = 70
      let energy = 60
      let hunger = 50
      let sleepiness = 30

      function updateStatusByTime() {
        const hour = new Date().getHours()
        if (hour >= 7 && hour <= 9) {
          mood -= 10
          sleepiness += 20
        }
        if (hour >= 22) {
          sleepiness += 15
        }
        if ((hour >= 11 && hour <= 13) || (hour >= 18 && hour <= 19)) {
          hunger += 20
        }
        mood = Math.max(-30, Math.min(100, mood))
        energy = Math.max(0, Math.min(100, energy))
        hunger = Math.max(0, Math.min(100, hunger))
        sleepiness = Math.max(0, Math.min(100, sleepiness))
      }

      updateStatusByTime()

      function showStatus() {
        let box = document.getElementById("statusBox")
        if (!box) {
          box = document.createElement("div")
          box.id = "statusBox"
          box.style.position = "fixed"
          box.style.top = "20px"
          box.style.left = "20px"
          box.style.padding = "10px 15px"
          box.style.background = "rgba(0,0,0,0.5)"
          box.style.color = "#fff"
          box.style.borderRadius = "10px"
          box.style.fontSize = "14px"
          document.body.appendChild(box)
        }
        box.innerHTML = `心情：${mood}<br>精力：${energy}<br>饥饿：${hunger}<br>困意：${sleepiness}`
      }
      showStatus()

      document.body.addEventListener("click", () => {
        const action = Math.floor(Math.random() * 3)
        if (action === 0) {
          hunger -= 20
          mood += 5
        } else if (action === 1) {
          sleepiness -= 30
          energy += 20
        } else {
          mood += 10
          energy -= 5
        }
        updateStatusByTime()
        showStatus()
      })

      // ---------- 时钟交互核心：基于北京时间，图标与主题联动 ----------
      const clockWidget = document.getElementById('clockWidget');
      const liveTimeEl = document.getElementById('liveTime');
      const liveDateEl = document.getElementById('liveDate');
      const liveWeekdayEl = document.getElementById('liveWeekday');
      const clockIconEl = document.getElementById('clockIcon');

      const weekdaysChinese = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];

      // 时间段图标映射（使用您提供的图片链接）
      const ICON_MAP = {
        night: "https://i.ibb.co/bjfKnynR/IMG-4774.png",   // 晚上图片
        day: "https://i.ibb.co/sJCmM13V/IMG-4775.png",     // 白天图片
        evening: "https://i.ibb.co/xtdH3Mpt/IMG-4773.png"  // 傍晚图片
      };

      function getBeijingTimeSegments() {
        const now = new Date();
        const utcHours = now.getUTCHours();
        const utcMinutes = now.getUTCMinutes();
        const utcSeconds = now.getUTCSeconds();
        const utcDay = now.getUTCDate();
        const utcMonth = now.getUTCMonth();
        const utcFullYear = now.getUTCFullYear();
        const utcDayOfWeek = now.getUTCDay();

        let beijingHours = utcHours + 8;
        let beijingDay = utcDay;
        let beijingMonth = utcMonth;
        let beijingYear = utcFullYear;
        let beijingDayOfWeek = utcDayOfWeek;

        if (beijingHours >= 24) {
          beijingHours -= 24;
          const next = new Date(Date.UTC(beijingYear, beijingMonth, beijingDay + 1));
          beijingDay = next.getUTCDate();
          beijingMonth = next.getUTCMonth();
          beijingYear = next.getUTCFullYear();
          beijingDayOfWeek = next.getUTCDay();
        }

        return {
          hours: beijingHours,
          minutes: utcMinutes,
          seconds: utcSeconds,
          day: beijingDay,
          month: beijingMonth,
          year: beijingYear,
          weekday: beijingDayOfWeek
        };
      }

      function getPeriodFromHour(hour) {
        if (hour >= 19 || hour <= 6) return 'night';
        if (hour >= 7 && hour <= 14) return 'day';
        if (hour >= 15 && hour <= 18) return 'evening';
        return 'night';
      }

      function updateClockDisplay() {
        const bj = getBeijingTimeSegments();
        const hoursStr = String(bj.hours).padStart(2, '0');
        const minutesStr = String(bj.minutes).padStart(2, '0');
        const timeString = `${hoursStr}:${minutesStr}`;
        const dayStr = String(bj.day).padStart(2, '0');
        const dateString = `${dayStr}日`;
        const weekdayString = weekdaysChinese[bj.weekday];

        liveTimeEl.textContent = timeString;
        liveDateEl.textContent = dateString;
        liveWeekdayEl.textContent = weekdayString;

        const period = getPeriodFromHour(bj.hours);

        // 更新右上角图标为对应的图片
        const iconUrl = ICON_MAP[period];
        if (clockIconEl) {
          // 用img元素替换文本，以显示实际图片
          if (clockIconEl.tagName === 'SPAN') {
            const img = document.createElement('img');
            img.id = 'clockIcon';
            img.src = iconUrl;
            img.alt = period;
            img.style.width = '32px';
            img.style.height = '32px';
            img.style.filter = 'drop-shadow(0 2px 6px rgba(0,0,0,0.5))';
            img.style.borderRadius = '8px';
            clockIconEl.replaceWith(img);
            // 更新引用
            window.clockIconImg = img;
          } else if (clockIconEl && clockIconEl.tagName === 'IMG') {
            clockIconEl.src = iconUrl;
            clockIconEl.alt = period;
          }
        }

        // 更新时钟卡片主题类
        clockWidget.classList.remove('theme-night', 'theme-day', 'theme-evening');
        clockWidget.classList.add(`theme-${period}`);
      }

      // 确保图标元素存在（初始可能是span，后续转为img）
      function ensureIconElement() {
        const el = document.getElementById('clockIcon');
        if (!el) return;
        if (el.tagName === 'IMG') {
          window.clockIconImg = el;
        }
      }

      // 立即执行并每秒刷新
      updateClockDisplay();
      ensureIconElement();
      setInterval(() => {
        updateClockDisplay();
      }, 1000);

      // 同时保留原有的update函数（用于背景等），但避免覆盖
      function update() {
        // 原有背景/状态更新已经通过独立interval处理，这里可留空或整合
        // 为避免冲突，只保留状态图标相关
      }
      // 原有setInterval调用保持不变，但update函数不再重复定义
    })();
  </script>
</body>
</html>
